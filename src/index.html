<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Composer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
   * 主题：暖色工程终端 —— 烟墨底 · 琥珀赤陶 accent
   * 布局：左侧辅助栏 + 右侧大写作编辑器（文本为唯一真相源）
   * ============================================================ */
  :root {
    --bg-deep:#ffffff;
    --bg-rail:#fbfbfa;
    --bg-editor:#ffffff;
    --surface:#f7f6f3;
    --surface-hi:#efeeec;
    --surface-inset:#f7f7f5;

    --line:#e9e9e7;
    --line-soft:#efefee;
    --line-hi:#dcdbd8;

    --text:#37352f;
    --text-soft:#5c594f;
    --muted:#918d84;
    --faint:#b0aca3;

    --amber:#d97757;
    --amber-hi:#c25f3f;
    --amber-deep:#edb69f;
    --amber-glow:rgba(217,119,87,0.14);
    --amber-soft:rgba(217,119,87,0.08);

    --warn:#e03e3e;
    --warn-soft:rgba(224,62,62,0.10);
    --ok:#0f7b6c;
    --ok-soft:rgba(15,123,108,0.10);

    --radius:10px;
    --radius-sm:7px;
    --font-display:'Fraunces', Georgia, 'Songti SC', serif;
    --font-mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, 'PingFang SC', 'Microsoft YaHei', monospace;
    --font-sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'HarmonyOS Sans SC', 'Microsoft YaHei', 'Source Han Sans SC', 'Noto Sans SC', sans-serif;
    --font-read:var(--font-sans);

    --shadow-card:0 1px 2px rgba(15,15,15,0.05), 0 2px 8px rgba(15,15,15,0.06);
    --shadow-toast:0 6px 20px rgba(15,15,15,0.14), 0 1px 3px rgba(15,15,15,0.08);

    --bg-glow:rgba(217,119,87,0.04);
    --brand-mark-a:#e08a6d;
    --brand-mark-b:#d97757;
    --brand-mark-fg:#ffffff;
    --brand-mark-shadow:0 2px 6px rgba(217,119,87,0.28), inset 0 1px 0 rgba(255,255,255,0.25);
    --seg-active-bg:#ffffff;
    --seg-active-fg:var(--text);
    --seg-active-shadow:0 1px 2px rgba(15,15,15,0.08), 0 1px 3px rgba(15,15,15,0.06);
    --block-hover:rgba(55,53,47,0.03);
    --block-focus:rgba(55,53,47,0.02);
  }

  /* 深色主题（Notion 深色：冷调深灰黑） */
  [data-theme="dark"] {
    --bg-deep:#191919;
    --bg-rail:#202020;
    --bg-editor:#191919;
    --surface:#252525;
    --surface-hi:#2f2f2f;
    --surface-inset:#1e1e1e;

    --line:#373737;
    --line-soft:#2c2c2c;
    --line-hi:#474747;

    --text:#e6e6e5;
    --text-soft:#b3b3b1;
    --muted:#8a8987;
    --faint:#6a6a68;

    --amber:#e08d70;
    --amber-hi:#eaa78e;
    --amber-deep:#c25f3f;
    --amber-glow:rgba(224,141,112,0.18);
    --amber-soft:rgba(224,141,112,0.12);

    --warn:#eb5757;
    --warn-soft:rgba(235,87,87,0.16);
    --ok:#4dab9a;
    --ok-soft:rgba(77,171,154,0.16);

    --shadow-card:0 1px 0 rgba(255,255,255,0.02), 0 4px 16px rgba(0,0,0,0.36);
    --shadow-toast:0 8px 30px rgba(0,0,0,0.55);

    --bg-glow:rgba(224,141,112,0.05);
    --brand-mark-a:#e08d70;
    --brand-mark-b:#c25f3f;
    --brand-mark-fg:#ffffff;
    --brand-mark-shadow:0 2px 8px rgba(224,141,112,0.32), inset 0 1px 0 rgba(255,255,255,0.18);
    --seg-active-bg:#3a3a3a;
    --seg-active-fg:var(--text);
    --seg-active-shadow:0 1px 2px rgba(0,0,0,0.4);
    --block-hover:rgba(255,255,255,0.03);
    --block-focus:rgba(255,255,255,0.045);
  }

  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }

  body {
    font-family:var(--font-sans);
    font-size:14px;
    font-weight:450;
    color:var(--text);
    background:var(--bg-deep);
    background-image:
      radial-gradient(1100px 500px at 82% -8%, var(--bg-glow), transparent 60%);
    height:100vh;
    overflow:hidden;
    display:grid;
    grid-template-columns:296px 1fr;
    -webkit-font-smoothing:antialiased;
  }

  ::selection { background:var(--amber-glow); color:var(--amber-hi); }
  button, input, textarea { font-family:inherit; font-size:inherit; color:inherit; }
  :focus-visible { outline:2px solid var(--amber); outline-offset:2px; border-radius:5px; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  /* ============================================================
   * 左栏：辅助栏
   * ============================================================ */
  .rail {
    background:var(--bg-rail);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-width:0;
    overflow:hidden;
    position:relative;
  }

  .rail-head { padding:20px 18px 14px; border-bottom:1px solid var(--line-soft); }
  .brand { display:flex; align-items:center; gap:10px; }
  .rail-head-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .theme-toggle {
    flex:none; width:34px; height:34px; border-radius:var(--radius-sm);
    border:1px solid var(--line); background:var(--surface); color:var(--text-soft);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
  }
  .theme-toggle:hover { background:var(--surface-hi); border-color:var(--line-hi); color:var(--text); }
  .theme-toggle svg { width:17px; height:17px; }
  .theme-toggle .icon-sun { display:none; }
  .theme-toggle .icon-moon { display:block; }
  [data-theme="dark"] .theme-toggle .icon-sun { display:block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display:none; }
  .brand-mark {
    width:30px; height:30px; border-radius:8px;
    background:linear-gradient(150deg, var(--brand-mark-a), var(--brand-mark-b));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--brand-mark-fg);
    flex:none;
    box-shadow:var(--brand-mark-shadow);
  }
  .brand-text { display:flex; flex-direction:column; line-height:1.1; }
  .brand-name { font-family:var(--font-display); font-weight:600; font-size:21px; color:var(--text); letter-spacing:-0.01em; }
  .brand-tagline { font-size:10.5px; letter-spacing:0.14em; color:var(--faint); text-transform:uppercase; margin-top:1px; }

  .rail-scroll { flex:1; overflow-y:auto; padding:16px 18px 18px; min-height:0; }

  .rail-section { margin-bottom:22px; }
  .rail-section-title {
    margin-bottom:10px;
    font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .rail-section-title .rst-line { flex:1; }
  .rail-section-title .rst-gear { margin-left:auto; }
  .rail-section-title .rst-count { font-family:var(--font-mono); font-size:10px; color:var(--faint); letter-spacing:0; text-transform:none; }
  .rst-gear {
    display:inline-flex; align-items:center; justify-content:center;
    width:28px; height:28px; border-radius:6px; flex:none;
    border:1px solid transparent; background:transparent; color:var(--muted);
    cursor:pointer; transition:background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .rst-gear:hover { background:var(--surface); color:var(--amber); border-color:var(--line); }

  /* 插入模块：小药丸网格 */
  .insert-grid { display:flex; flex-wrap:wrap; gap:6px; }
  .insert-pill {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 10px; border-radius:999px;
    background:var(--surface); border:1px solid var(--line);
    color:var(--text-soft); cursor:pointer; font-size:12px;
    transition:background 0.14s ease, border-color 0.14s ease, color 0.14s ease, transform 0.12s cubic-bezier(0.2,0,0,1), box-shadow 0.14s ease;
  }
  .insert-pill:hover { background:var(--surface-hi); border-color:var(--amber-deep); color:var(--text); transform:translateY(-1px); box-shadow:var(--shadow-card); }
  .insert-pill:active { transform:translateY(0px); }
  .insert-pill .ip-plus { color:var(--amber); font-family:var(--font-mono); font-weight:600; }

  /* 常用句 */
  .snippet-wrap { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .snippet-pill {
    display:inline-flex; align-items:center; gap:5px;
    background:var(--surface-inset); border:1px solid var(--line);
    border-radius:999px; padding:4px 10px; font-size:11.5px; color:var(--text-soft);
    cursor:pointer; transition:background 0.12s ease, border-color 0.12s ease, color 0.12s ease, transform 0.12s cubic-bezier(0.2,0,0,1);
  }
  .snippet-pill:hover { background:var(--amber-soft); border-color:var(--amber-deep); color:var(--amber); transform:translateY(-1px); }
  .snippet-pill:active { transform:translateY(0px); }

  /* 管理常用句浮窗 */
  .sm-overlay {
    position:fixed; inset:0; z-index:1000;
    display:none; align-items:center; justify-content:center;
    background:rgba(15,15,15,0.42); backdrop-filter:blur(2px);
    padding:24px;
  }
  .sm-overlay.show { display:flex; }
  .sm-panel {
    width:min(640px, 100%); max-height:min(82vh, 720px);
    display:flex; flex-direction:column;
    background:var(--bg-editor); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow-toast);
    overflow:hidden;
  }
  .sm-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 12px; border-bottom:1px solid var(--line-soft); flex:none;
  }
  .sm-title { font-size:15px; font-weight:600; color:var(--text); }
  .sm-close {
    width:28px; height:28px; border-radius:var(--radius-sm);
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid transparent; background:transparent; color:var(--muted);
    line-height:1; cursor:pointer;
    transition:background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .sm-close svg { width:16px; height:16px; }
  .sm-close:hover { background:var(--surface); color:var(--text); border-color:var(--line); }
  .sm-hint { padding:10px 20px 4px; font-size:11.5px; color:var(--muted); flex:none; }
  .sm-list { padding:8px 20px; overflow-y:auto; flex:1 1 auto; }
  .sm-row {
    display:grid;
    grid-template-columns:auto 1fr auto auto;
    align-items:start; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--line-soft);
  }
  .sm-row:last-child { border-bottom:none; }
  .sm-row.hidden .sm-body { opacity:0.5; }
  .sm-chk { margin-top:8px; width:15px; height:15px; cursor:pointer; accent-color:var(--amber); flex:none; }
  .sm-chk:disabled { cursor:not-allowed; opacity:0.55; }
  .sm-body { display:flex; flex-direction:column; gap:5px; min-width:0; }
  .sm-tag {
    font-size:12px; font-weight:600; color:var(--text);
    border:1px solid transparent; background:transparent; border-radius:5px;
    padding:3px 6px; width:100%;
    transition:border-color 0.12s ease, background 0.12s ease;
  }
  .sm-tag:hover { background:var(--surface); }
  .sm-tag:focus { border-color:var(--amber-deep); background:var(--surface-inset); outline:none; }
  .sm-text {
    font-family:var(--font-read); font-size:12px; color:var(--text-soft);
    border:1px solid var(--line); background:var(--surface-inset); border-radius:5px;
    padding:5px 7px; width:100%; resize:none; overflow:hidden; line-height:1.5;
    min-height:30px; box-sizing:border-box;
    transition:border-color 0.12s ease;
  }
  .sm-text:focus { border-color:var(--amber-deep); outline:none; }
  .sm-ops { display:flex; gap:3px; flex:none; margin-top:2px; }
  .sm-op {
    width:24px; height:24px; border-radius:5px;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid var(--line); background:var(--surface); color:var(--text-soft);
    line-height:1; cursor:pointer;
    transition:border-color 0.12s ease, color 0.12s ease, background 0.12s ease;
  }
  .sm-op svg { width:13px; height:13px; }
  .sm-op:hover:not(:disabled) { border-color:var(--amber-deep); color:var(--amber); }
  .sm-op.danger:hover:not(:disabled) { border-color:var(--warn); color:var(--warn); }
  .sm-op:disabled { opacity:0.32; cursor:default; }
  .sm-badge {
    font-size:10px; padding:2px 7px; border-radius:999px; flex:none; margin-top:3px;
    white-space:nowrap; align-self:start;
  }
  .sm-badge.builtin { background:var(--surface-hi); color:var(--muted); }
  .sm-badge.custom { background:var(--amber-soft); color:var(--amber); }
  .sm-foot { padding:12px 20px 16px; border-top:1px solid var(--line-soft); flex:none; }
  .sm-add {
    display:inline-flex; align-items:center; gap:7px;
    border:1px dashed var(--line-hi); background:transparent; color:var(--text-soft);
    border-radius:var(--radius-sm); padding:8px 14px; font-size:12.5px; cursor:pointer;
    transition:border-color 0.12s ease, color 0.12s ease, background 0.12s ease;
  }
  .sm-add:hover { border-color:var(--amber); color:var(--amber); background:var(--amber-soft); }
  .sm-add svg { width:14px; height:14px; }

  .btn-ghost-rail {
    display:inline-flex; align-items:center; gap:6px;
    background:transparent; border:1px solid var(--line); color:var(--text-soft);
    border-radius:var(--radius-sm); padding:0 14px; height:40px; cursor:pointer; font-size:12.5px; white-space:nowrap; flex:none;
    transition:border-color 0.14s ease, color 0.14s ease, background 0.14s ease, transform 0.12s cubic-bezier(0.2,0,0,1);
  }
  .btn-ghost-rail:hover { border-color:var(--amber-deep); color:var(--text); background:var(--surface); transform:translateY(-1px); }
  .btn-ghost-rail:active { transform:translateY(0px); }
  .btn-ghost-rail.danger:hover { border-color:var(--warn); color:var(--warn); }
  .btn-ghost-rail .bg-ico { width:15px; display:inline-flex; align-items:center; justify-content:center; opacity:0.7; }
  .btn-ghost-rail .bg-ico svg { width:14px; height:14px; }

  .rail-foot { padding:12px 18px 16px; border-top:1px solid var(--line-soft); flex:none; }
  .btn-load-tpl {
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    background:var(--surface); border:1px solid var(--amber-deep); color:var(--amber-hi);
    border-radius:var(--radius-sm); padding:0 14px; height:42px; cursor:pointer;
    font-size:13px; font-weight:600; white-space:nowrap;
    transition:border-color 0.14s ease, color 0.14s ease, background 0.14s ease, transform 0.08s ease;
  }
  .btn-load-tpl:hover { background:var(--surface-hi); border-color:var(--amber-hi); }
  .btn-load-tpl:active { transform:translateY(1px); }
  .btn-load-tpl .bg-ico { display:inline-flex; align-items:center; justify-content:center; opacity:0.85; }
  .btn-load-tpl .bg-ico svg { width:15px; height:15px; }

  /* ============================================================
   * 右栏：主写作编辑器
   * ============================================================ */
  .editor {
    display:flex; flex-direction:column;
    min-width:0; overflow:hidden;
    background:var(--bg-editor);
  }

  .editor-head {
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:18px 28px 14px;
    flex:none;
  }
  .editor-title-wrap { display:flex; align-items:baseline; gap:12px; min-width:0; }
  .editor-title { font-family:var(--font-display); font-weight:600; font-size:22px; color:var(--text); letter-spacing:-0.01em; }
  .editor-sub { font-size:12px; color:var(--muted); font-family:var(--font-mono); }

  .editor-settings-btn {
    flex:none; width:44px; height:44px; border-radius:var(--radius-sm);
    border:1px solid var(--line); background:var(--surface); color:var(--text-soft);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
  }
  .editor-settings-btn:hover { background:var(--surface-hi); border-color:var(--line-hi); color:var(--text); }
  .editor-settings-btn svg { width:22px; height:22px; }

  .segmented { display:inline-flex; background:var(--surface-inset); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; flex:none; }
  .segmented button {
    border:none; background:transparent; padding:6px 18px; border-radius:999px; cursor:pointer;
    color:var(--muted); font-size:13px; font-weight:500;
    transition:background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
  }
  .segmented button[aria-pressed="true"] {
    background:var(--seg-active-bg);
    color:var(--seg-active-fg); font-weight:600; box-shadow:var(--seg-active-shadow);
  }

  /* 编辑区主体：占满剩余高度 */
  .editor-main { flex:1; display:flex; flex-direction:column; min-height:0; padding:0 28px 20px; }

  .editor-surface {
    flex:1; display:flex; flex-direction:column; min-height:0;
    border:1px solid var(--line); border-radius:var(--radius);
    background:var(--surface-inset);
    box-shadow:var(--shadow-card);
    overflow:hidden;
    transition:border-color 0.15s ease;
  }
  .editor-surface:focus-within { border-color:var(--amber-deep); }

  .editor-toolbar {
    display:flex; align-items:center; gap:10px;
    padding:9px 14px; border-bottom:1px solid var(--line-soft);
    flex:none;
    background:var(--surface);
  }
  .editor-toolbar .et-label { font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--faint); }
  .editor-toolbar .et-spacer { flex:1; }
  .editor-toolbar .et-stat { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .editor-toolbar .et-stat b { color:var(--text-soft); font-weight:600; }
  .editor-toolbar .et-stat .et-bad { color:var(--warn); }
  .seg-mini { display:inline-flex; background:var(--surface-inset); border:1px solid var(--line); border-radius:7px; padding:2px; gap:2px; }
  .seg-mini button {
    border:none; background:transparent; padding:3px 11px; border-radius:5px; cursor:pointer;
    color:var(--muted); font-size:11.5px; font-weight:500; transition:background 0.14s, color 0.14s;
  }
  .seg-mini button[aria-pressed="true"] { background:var(--surface-hi); color:var(--amber); }

  /* 预览层（只读渲染）— 与编辑框互斥显示 */
  .editor-preview {
    flex:1; width:100%; min-height:0; overflow-y:auto;
    padding:22px 26px;
    font-family:var(--font-read); font-size:15px; line-height:1.8; color:var(--text-soft);
    white-space:pre-wrap; word-break:break-word;
  }
  .editor-preview .pv-h { color:var(--amber); font-weight:600; }
  .editor-preview-empty { color:var(--faint); }

  /* ---------- 块化编辑器（Notion 式，每个 ## 段落一张卡片） ---------- */
  .blocks {
    flex:1; width:100%; min-height:0; overflow-y:auto;
    padding:16px 18px 40px;
    display:flex; flex-direction:column; gap:8px;
  }
  .block {
    display:flex; align-items:stretch; gap:2px;
    border:1px solid transparent; border-radius:var(--radius-sm);
    transition:border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease, opacity 0.15s ease;
  }
  .block:hover { background:var(--block-hover); }
  .block:focus-within { border-color:var(--line-hi); background:var(--block-focus); }
  /* FLIP：让位块从旧位置平滑滑到新位置（transform 由 JS 设置，这里给过渡曲线） */
  .block.flip { transition:transform 0.22s cubic-bezier(0.2, 0, 0, 1), border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease; }
  /* 被拖块：跟随指针，浮起，脱离命中检测 */
  .block.dragging {
    position:relative; z-index:20;
    opacity:0.97; pointer-events:none;
    box-shadow:0 12px 34px rgba(0,0,0,0.5), 0 0 0 1px var(--amber-deep);
    background:var(--surface); border-color:var(--amber-deep);
    cursor:grabbing;
  }
  /* 被拖块原位留下的“凹槽”占位（虚线轮廓） */
  .block.drag-placeholder {
    border:1px dashed var(--line-hi); background:var(--surface-inset);
    border-radius:var(--radius-sm);
  }

  .block-gutter {
    flex:none; width:26px;
    display:flex; flex-direction:column; align-items:center; padding-top:9px; gap:2px;
    opacity:0; transition:opacity 0.12s ease;
  }
  .block:hover .block-gutter, .block:focus-within .block-gutter { opacity:1; }
  .block-handle {
    width:22px; height:22px; border-radius:5px;
    display:flex; align-items:center; justify-content:center;
    color:var(--faint); cursor:grab; user-select:none;
    touch-action:none; transition:color 0.12s ease, background 0.12s ease;
  }
  .block-handle svg { width:15px; height:15px; }
  .block-handle:hover { color:var(--amber); background:var(--amber-soft); }
  .block-handle:active { cursor:grabbing; }
  .block-del {
    width:22px; height:22px; border:none; background:transparent; cursor:pointer;
    color:var(--faint); border-radius:5px; display:flex; align-items:center; justify-content:center;
    transition:color 0.12s ease, background 0.12s ease;
  }
  .block-del svg { width:12px; height:12px; }
  .block-del:hover { color:var(--warn); background:var(--warn-soft); }

  .block-body { flex:1; min-width:0; padding:4px 6px 4px 0; }

  /* ---------- Markdown 语法高亮：overlay 技术 ----------
   * .hl-wrap 相对定位；.hl-overlay 绝对铺满，与 textarea 使用完全相同的
   * font/padding/line-height/white-space/word-break，逐字渲染高亮 HTML；
   * textarea 本体文字设为透明但保留可见光标（caret-color），
   * 这样"看起来"是 textarea 在显示高亮文字，实际输入体验不受影响。 */
  .hl-wrap { position:relative; display:block; width:100%; }
  .hl-overlay {
    position:absolute; inset:0;
    pointer-events:none; overflow:hidden;
    white-space:pre-wrap; word-break:break-word;
    padding:6px 8px;
    font-family:var(--font-read); font-size:15px; line-height:1.75;
    tab-size:2;
    color:var(--text);
  }
  .hl-overlay .hl-h { color:var(--amber); font-weight:600; }
  .hl-overlay .hl-bold { color:var(--text); font-weight:700; }
  .hl-overlay .hl-italic { color:var(--text-soft); font-style:italic; }
  .hl-overlay .hl-code { font-family:var(--font-mono); color:var(--amber-hi); background:var(--amber-soft); border-radius:3px; }
  .hl-overlay .hl-fence { font-family:var(--font-mono); color:var(--muted); }
  .hl-overlay .hl-list { color:var(--amber); font-weight:600; }
  .hl-overlay .hl-quote { color:var(--muted); font-style:italic; }
  .hl-overlay .hl-link-text { color:var(--amber-hi); }
  .hl-overlay .hl-link-url { color:var(--muted); }

  .block-textarea {
    position:relative; z-index:1;
    width:100%; height:100%; resize:none; overflow:hidden;
    border:none; outline:none; background:transparent;
    padding:6px 8px;
    font-family:var(--font-read); font-size:15px; line-height:1.75;
    color:transparent; caret-color:var(--text);
    tab-size:2; display:block;
  }
  .block-textarea::placeholder { color:var(--faint); }

  .blocks-empty {
    color:var(--faint); padding:26px 8px; font-size:13px; line-height:1.7;
  }
  .blocks-empty code { font-family:var(--font-mono); color:var(--amber); background:var(--amber-soft); padding:0 4px; border-radius:4px; }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    border-radius:var(--radius-sm); padding:11px 20px; font-size:13px; font-weight:600;
    cursor:pointer; border:1px solid transparent;
    transition:background 0.14s ease, border-color 0.14s ease, color 0.14s ease, transform 0.14s cubic-bezier(0.2,0,0,1), box-shadow 0.14s ease;
    flex:none;
  }
  .btn svg { width:15px; height:15px; }
  .btn:hover { transform:translateY(-1px); }
  .btn:active { transform:translateY(0px); }
  .btn-primary { background:var(--amber); color:#ffffff; box-shadow:0 2px 10px rgba(217,119,87,0.28); }
  .btn-primary:hover { background:var(--amber-hi); box-shadow:0 4px 14px rgba(217,119,87,0.34); }
  .btn-outline { background:var(--surface); border-color:var(--line-hi); color:var(--text-soft); }
  .btn-outline:hover { border-color:var(--amber-deep); color:var(--text); box-shadow:var(--shadow-card); }

  /* ============================================================
   * 微交互动效：块新增淡入、toast 滑入淡入、预览切换过渡
   * ============================================================ */
  @keyframes blockEnter {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes toastSlideIn {
    from { opacity:0; transform:translateX(-50%) translateY(10px); }

  .toast.err::before { background:var(--warn); }

  .blocks, .editor-preview { animation:viewFadeIn 0.16s ease both; }

    };
  }

  function defaultState() {
    return {
      lang: 'zh',
      content: demoContent(),
      customSnippets: [],
      builtinPatches: {},                              // { builtinId: {tag?, zh?, en?, hidden?} }
      snippetOrder: BUILTIN_SNIPPETS.map(function (b) { return b.id; }),
      customModules: [],
      modulePatches: {},                               // { moduleId: {labelZh?, labelEn?, textZh?, textEn?, hidden?} }
      moduleOrder: INSERT_MODULES.map(function (m) { return m.id; })
    };

  var snippetSeq = 0;
  function newSnippetId() {
    snippetSeq++;
    return 'c_' + Date.now().toString(36) + '_' + snippetSeq.toString(36);
  }
  var moduleSeq = 0;
  function newModuleId() {
    moduleSeq++;
    return 'mc_' + Date.now().toString(36) + '_' + moduleSeq.toString(36);
  }

  /* ============================================================
   * 2. 状态 + 持久化
   * ============================================================ */
  var state = defaultState();
  var view = 'write'; // 'write' | 'preview'
  var saveTimer = null;

  function scheduleSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(persistState, 300);
  }

  var appDataEnsured = false;
  function ensureAppDataDir() {
    if (appDataEnsured || !fsApi.mkdir) return Promise.resolve();
    return fsApi.mkdir('.', { baseDir: BaseDirectory.AppData, recursive: true })
      .then(function () { appDataEnsured = true; })
      .catch(function () { appDataEnsured = true; });
  }

  function persistState() {
    if (!tauriAvailable()) return;
    var payload = JSON.stringify(state, null, 2);
    ensureAppDataDir().then(function () {
      return fsApi.writeTextFile(STATE_FILE, payload, { baseDir: BaseDirectory.AppData });
    }).catch(function (err) { console.warn('持久化失败:', err); });
  }

  function restoreState() {
    if (!tauriAvailable()) { renderAll(); return; }
    fsApi.exists(STATE_FILE, { baseDir: BaseDirectory.AppData })
      .then(function (exists) {
        if (!exists) throw new Error('no-state-file');
        return fsApi.readTextFile(STATE_FILE, { baseDir: BaseDirectory.AppData });
      })
      .then(function (text) {
        var parsed = JSON.parse(text);
        if (parsed && typeof parsed === 'object') state = normalizeState(parsed);
      })
      .catch(function () { state = defaultState(); })
      .then(function () { renderAll(); });
  }

  // 兼容旧存档：旧版是 modules 数组，编译成一份大文本。
  function modulesToText(modules, lang) {
    if (!Array.isArray(modules)) return '';
    return modules
      .filter(function (m) { return m && m.enabled !== false; })
      .map(function (m) {
        var label = (m.label && (m.label[lang] || m.label.zh || m.label.en)) || '';
        var body = (m.content && (m.content[lang] || '')) || '';
        return '## ' + label + '\n' + body;
      })
      .join('\n\n');
  }

  function normalizeState(raw) {
    var s = defaultState();
    s.lang = (raw.lang === 'en') ? 'en' : 'zh';

    if (raw.content && typeof raw.content === 'object' &&
        (typeof raw.content.zh === 'string' || typeof raw.content.en === 'string')) {
      // 新格式
      s.content = { zh: raw.content.zh || '', en: raw.content.en || '' };
    } else if (Array.isArray(raw.modules)) {
      // 旧格式迁移
      s.content = { zh: modulesToText(raw.modules, 'zh'), en: modulesToText(raw.modules, 'en') };
    }

    if (Array.isArray(raw.customSnippets)) {
      s.customSnippets = raw.customSnippets
        .filter(function (sn) { return sn && typeof sn.tag === 'string'; })
        .map(function (sn) {
          return {
            id: (typeof sn.id === 'string' && sn.id) ? sn.id : newSnippetId(),
            tag: sn.tag,
            zh: typeof sn.zh === 'string' ? sn.zh : (sn.text || ''),
            en: typeof sn.en === 'string' ? sn.en : (sn.text || ''),
            builtin: false,
            hidden: sn.hidden === true
          };
        });
    }

    // 内置句覆盖（隐藏 / 改标签 / 改内容）
    s.builtinPatches = {};
    if (raw.builtinPatches && typeof raw.builtinPatches === 'object') {
      Object.keys(raw.builtinPatches).forEach(function (id) {
        if (!BUILTIN_BY_ID[id]) return;
        var p = raw.builtinPatches[id];
        if (!p || typeof p !== 'object') return;
        var clean = {};
        if (typeof p.tag === 'string') clean.tag = p.tag;
        if (typeof p.zh === 'string') clean.zh = p.zh;
        if (typeof p.en === 'string') clean.en = p.en;
        if (p.hidden === true) clean.hidden = true;
        s.builtinPatches[id] = clean;
      });
    }

    // 顺序：以存档顺序为准，去掉失效 id，再把新出现的补到末尾
    var validIds = {};
    BUILTIN_SNIPPETS.forEach(function (b) { validIds[b.id] = true; });
    s.customSnippets.forEach(function (c) { validIds[c.id] = true; });
    var order = [];
    var seen = {};
    if (Array.isArray(raw.snippetOrder)) {
      raw.snippetOrder.forEach(function (id) {
        if (typeof id === 'string' && validIds[id] && !seen[id]) { order.push(id); seen[id] = true; }
      });
    }
    // 补齐：先内置再自定义，保持各自默认顺序
    BUILTIN_SNIPPETS.forEach(function (b) { if (!seen[b.id]) { order.push(b.id); seen[b.id] = true; } });
    s.customSnippets.forEach(function (c) { if (!seen[c.id]) { order.push(c.id); seen[c.id] = true; } });
    s.snippetOrder = order;

    // 自定义插入模块
    if (Array.isArray(raw.customModules)) {
      s.customModules = raw.customModules
        .filter(function (m) { return m && m.label && typeof m.label === 'object'; })
        .map(function (m) {
          var t = (m.text && typeof m.text === 'object') ? m.text : {};
          return {
            id: (typeof m.id === 'string' && m.id) ? m.id : newModuleId(),
            label: { zh: m.label.zh || '', en: m.label.en || '' },
            text: { zh: typeof t.zh === 'string' ? t.zh : '', en: typeof t.en === 'string' ? t.en : '' },
            builtin: false,
            hidden: m.hidden === true
          };
        });
    }

    // 内置模块覆盖
    s.modulePatches = {};
    if (raw.modulePatches && typeof raw.modulePatches === 'object') {
      Object.keys(raw.modulePatches).forEach(function (id) {
        if (!MODULE_BY_ID[id]) return;
        var p = raw.modulePatches[id];
        if (!p || typeof p !== 'object') return;
        var clean = {};
        if (typeof p.labelZh === 'string') clean.labelZh = p.labelZh;
        if (typeof p.labelEn === 'string') clean.labelEn = p.labelEn;
        if (typeof p.textZh === 'string') clean.textZh = p.textZh;
        if (typeof p.textEn === 'string') clean.textEn = p.textEn;
        if (p.hidden === true) clean.hidden = true;
        s.modulePatches[id] = clean;
      });
    }

    // 模块顺序
    var mValid = {};
    INSERT_MODULES.forEach(function (m) { mValid[m.id] = true; });
    s.customModules.forEach(function (m) { mValid[m.id] = true; });
    var mOrder = [];
    var mSeen = {};
    if (Array.isArray(raw.moduleOrder)) {
      raw.moduleOrder.forEach(function (id) {
        if (typeof id === 'string' && mValid[id] && !mSeen[id]) { mOrder.push(id); mSeen[id] = true; }
      });
    }
    INSERT_MODULES.forEach(function (m) { if (!mSeen[m.id]) { mOrder.push(m.id); mSeen[m.id] = true; } });
    s.customModules.forEach(function (m) { if (!mSeen[m.id]) { mOrder.push(m.id); mSeen[m.id] = true; } });
    s.moduleOrder = mOrder;

    return s;
  }

  /* ============================================================
   * 3. token 估算
   * ============================================================ */
  function estimateTokens(text) {
    if (!text) return 0;
    var cjk = 0, other = 0;
    for (var i = 0; i < text.length; i++) {
      var code = text.codePointAt(i);
      var isCjk = (code >= 0x3000 && code <= 0x303f) || (code >= 0x3400 && code <= 0x9fff) || (code >= 0xff00 && code <= 0xffef);
      if (isCjk) cjk++; else other++;
    }
    return Math.round(cjk * 1.6 + other / 4);
  }

  }

  /* ============================================================
   * 6. 块模型：正文 ⇄ 块 的解析与回写
   * ------------------------------------------------------------
   * 真相源仍是 state.content[lang] 大文本。块只是视图：
   *   parseBlocks(text) 把文本按 "## " 开头切成块（首个 ## 之前的
   *   内容作为一个无标题“前言块”）；编辑/拖拽后由 collectText() 从
   *   DOM 顺序收集各块文本并以空行拼回，写入 state。
   * ============================================================ */
  function parseBlocks(text) {
    text = text || '';
    if (!text.trim()) return [];
    var lines = text.split('\n');
    var blocks = [];
    var cur = null;
    lines.forEach(function (line) {
      if (/^##\s/.test(line) || /^##$/.test(line)) {
        if (cur !== null) blocks.push(cur);
        cur = line;
      } else {
        if (cur === null) cur = line;            // 前言块
        else cur += '\n' + line;
      }
    });
    if (cur !== null) blocks.push(cur);
    // 去掉纯空白块（多为块间的空行）
    return blocks.filter(function (b) { return b.trim() !== ''; });
  }

  // 从 DOM 中所有块 textarea 收集文本，拼成正文并写回 state。
  function collectText() {
    var areas = $blocks.querySelectorAll('.block-textarea');
    var parts = [];
    areas.forEach(function (a) {
      var v = a.value.replace(/\s+$/, ''); // 去块尾多余空白，避免累积空行
      if (v !== '') parts.push(v);
    });
    var text = parts.join('\n\n');
    state.content[state.lang] = text;
    return text;
  }

  // 在当前聚焦块的光标处插入片段；无聚焦块则新建一个块（追加到末尾）。
  function insertSnippet(snippet) {
    var active = document.activeElement;
    var isBlockArea = active && active.classList && active.classList.contains('block-textarea');
    var isModuleTemplate = snippet.slice(0, 2) === '##';

    if (isBlockArea && !isModuleTemplate) {
      // 短句：插入到当前块光标处
      var el = active;
      var start = el.selectionStart, end = el.selectionEnd;
      var before = el.value.slice(0, start);
      var pre = (before.length > 0 && !before.endsWith('\n')) ? '\n' : '';
      var insertText = pre + snippet;
      el.value = before + insertText + el.value.slice(end);
      var caret = before.length + insertText.length;
      el.focus();
      el.setSelectionRange(caret, caret);
      autosize(el);
      onBlocksChanged();
    } else {
      // 模块模板，或未聚焦任何块：作为新块追加
      var text = collectText();
      var joined = text ? (text + '\n\n' + snippet) : snippet;
      state.content[state.lang] = joined;
      renderBlocks();
      markLastBlockAsNew();
      refreshStat();
      scheduleSave();
      // 聚焦新块末尾
      var areas = $blocks.querySelectorAll('.block-textarea');
      var last = areas[areas.length - 1];
      if (last) { last.focus(); last.setSelectionRange(last.value.length, last.value.length); }
    }
  }

  // 把一个 id 解析成可用的模块对象（内置合并覆盖；返回含 hidden 标记）
  function resolveModule(id) {
    var b = MODULE_BY_ID[id];
    if (b) {
      var p = state.modulePatches[id] || {};
      return {
        id: id,
        builtin: true,
        label: {
          zh: typeof p.labelZh === 'string' ? p.labelZh : b.label.zh,
          en: typeof p.labelEn === 'string' ? p.labelEn : b.label.en
        },
        text: {
          zh: typeof p.textZh === 'string' ? p.textZh : b.text.zh,
          en: typeof p.textEn === 'string' ? p.textEn : b.text.en
        },
        hidden: p.hidden === true
      };
    }
    var c = null;
    for (var i = 0; i < state.customModules.length; i++) {
      if (state.customModules[i].id === id) { c = state.customModules[i]; break; }
    }
    if (!c) return null;
    return { id: id, builtin: false, label: { zh: c.label.zh, en: c.label.en }, text: { zh: c.text.zh, en: c.text.en }, hidden: c.hidden === true };
  }

  function orderedModules() {
    return state.moduleOrder.map(resolveModule).filter(Boolean);
  }

  function visibleModules() {
    return orderedModules().filter(function (m) { return !m.hidden; });
  }

  function renderInsertGrid() {
    var lang = state.lang;
    $insertGrid.innerHTML = '';
    visibleModules().forEach(function (mod) {
      var pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'insert-pill';
      pill.setAttribute('role', 'listitem');
      pill.title = '插入到光标处';
      pill.innerHTML = '<span class="ip-plus">+</span><span>' + escapeHtml(mod.label[lang] || mod.label.zh || mod.label.en) + '</span>';
      pill.addEventListener('click', function () { insertSnippet(mod.text[lang] || mod.text.zh || mod.text.en); });
      $insertGrid.appendChild(pill);
    });
  }

  // 把一个 id 解析成可用的句子对象（内置合并覆盖；返回含 hidden 标记）
  function resolveSnippet(id) {
    var b = BUILTIN_BY_ID[id];
    if (b) {
      var p = state.builtinPatches[id] || {};
      return {
        id: id,
        builtin: true,
        tag: typeof p.tag === 'string' ? p.tag : b.tag,
        zh: typeof p.zh === 'string' ? p.zh : b.zh,
        en: typeof p.en === 'string' ? p.en : b.en,
        hidden: p.hidden === true
      };
    }
    var c = null;
    for (var i = 0; i < state.customSnippets.length; i++) {
      if (state.customSnippets[i].id === id) { c = state.customSnippets[i]; break; }
    }
    if (!c) return null;
    return { id: id, builtin: false, tag: c.tag, zh: c.zh, en: c.en, hidden: c.hidden === true };
  }

  // 按顺序返回全部句子（含隐藏，供管理浮窗使用）
  function orderedSnippets() {
    return state.snippetOrder.map(resolveSnippet).filter(Boolean);
  }

  // 左栏可见句子（排除隐藏）
  function allSnippets() {
    return orderedSnippets().filter(function (s) { return !s.hidden; });
  }

  function renderSnippets() {
    var lang = state.lang;
    $snippetWrap.innerHTML = '';
    allSnippets().forEach(function (snip) {
      var pill = document.createElement('span');
      pill.className = 'snippet-pill';
      pill.title = snip[lang] || snip.zh || snip.en;
      var t = document.createElement('span');
      t.textContent = snip.tag;
      pill.appendChild(t);
      pill.addEventListener('click', function () {
        insertSnippet(snip[lang] || snip.zh || snip.en);
      });
      $snippetWrap.appendChild(pill);
    });
  }

  /* ---------- 通用管理浮窗（常用句 / 插入模块共用） ---------- */
  var $smOverlay = null, $smList = null, $smTitle = null, $smHint = null, $smAddBtn = null;
  var smKeyHandler = null, SM = null;

  function ensureSnippetManager() {
    if ($smOverlay) return;

    $smHint = $smOverlay.querySelector('#smHint');
    $smAddBtn = $smOverlay.querySelector('#smAdd');

    $smOverlay.addEventListener('mousedown', function (e) {
      if (e.target === $smOverlay) closeSnippetManager();
    });
    $smOverlay.querySelector('.sm-close').addEventListener('click', closeSnippetManager);
    $smAddBtn.addEventListener('click', function () {
      if (SM) SM.addCustom();
    });
  }

  // ===== 常用句适配器 =====
  function snippetAdapter() {
    return {
      title: '管理常用句',
      hint: '勾选决定是否在左栏显示 · 点标签或内容可直接编辑 · 用 ↑↓ 调整顺序',
      addLabel: '新增自定义常用句',
      tagMax: 20,
      tagPlaceholder: '标签',
      textPlaceholder: function (lang) { return lang === 'zh' ? '中文内容' : 'English content'; },
      order: function () { return state.snippetOrder; },
      ordered: function () {
        var lang = state.lang;
        return orderedSnippets().map(function (s) {
          return { id: s.id, builtin: s.builtin, hidden: s.hidden, tagValue: s.tag, textValue: s[lang] || '' };
        });
      },
      setHidden: function (id, hidden) {
        if (BUILTIN_BY_ID[id]) patchBuiltinSnippet(id, 'hidden', hidden);
        else updateCustomSnippetField(id, 'hidden', hidden);
      },
      setTag: function (id, v) {
        if (BUILTIN_BY_ID[id]) patchBuiltinSnippet(id, 'tag', v);
        else updateCustomSnippetField(id, 'tag', v);
      },
      setText: function (id, v) {
        var lang = state.lang;
        if (BUILTIN_BY_ID[id]) patchBuiltinSnippet(id, lang, v);
        else updateCustomSnippetField(id, lang, v);
      },
      isModified: function (id) {
        var p = state.builtinPatches[id];
        return !!(p && (p.tag !== undefined || p.zh !== undefined || p.en !== undefined || p.hidden));
      },
      reset: function (id) { delete state.builtinPatches[id]; },
      deleteCustom: function (id) {
        for (var i = 0; i < state.customSnippets.length; i++) {
          if (state.customSnippets[i].id === id) { state.customSnippets.splice(i, 1); break; }
        }
        var oi = state.snippetOrder.indexOf(id);
        if (oi >= 0) state.snippetOrder.splice(oi, 1);
      },
      addCustom: function () {
        var c = { id: newSnippetId(), tag: '新常用句', zh: '', en: '', builtin: false, hidden: false };
        state.customSnippets.push(c);
        state.snippetOrder.push(c.id);
        scheduleSave();
        renderSnippetManager();
        renderLeft();
        focusLastRow();
      },
      renderLeft: renderSnippets
    };
  }

  // ===== 插入模块适配器 =====
  function moduleAdapter() {
    return {
      title: '管理插入模块',
      hint: '勾选决定是否在左栏显示 · 点标签或正文可直接编辑 · 用 ↑↓ 调整顺序',
      addLabel: '新增自定义模块',
      tagMax: 20,
      tagPlaceholder: '标签',
      textPlaceholder: function (lang) { return lang === 'zh' ? '插入的中文正文' : 'Inserted English text'; },
      order: function () { return state.moduleOrder; },
      ordered: function () {
        var lang = state.lang;
        return orderedModules().map(function (m) {
          return { id: m.id, builtin: m.builtin, hidden: m.hidden, tagValue: m.label[lang] || '', textValue: m.text[lang] || '' };
        });
      },
      setHidden: function (id, hidden) {
        if (MODULE_BY_ID[id]) patchBuiltinModule(id, 'hidden', hidden);
        else updateCustomModuleHidden(id, hidden);
      },
      setTag: function (id, v) {
        var lang = state.lang;
        if (MODULE_BY_ID[id]) patchBuiltinModule(id, lang === 'zh' ? 'labelZh' : 'labelEn', v);
        else updateCustomModuleField(id, 'label', lang, v);
      },
      setText: function (id, v) {
        var lang = state.lang;
        if (MODULE_BY_ID[id]) patchBuiltinModule(id, lang === 'zh' ? 'textZh' : 'textEn', v);
        else updateCustomModuleField(id, 'text', lang, v);
      },
      isModified: function (id) {
        var p = state.modulePatches[id];
        return !!(p && (p.labelZh !== undefined || p.labelEn !== undefined ||
                        p.textZh !== undefined || p.textEn !== undefined || p.hidden));
      },
      reset: function (id) { delete state.modulePatches[id]; },
      deleteCustom: function (id) {
        for (var i = 0; i < state.customModules.length; i++) {
          if (state.customModules[i].id === id) { state.customModules.splice(i, 1); break; }
        }
        var oi = state.moduleOrder.indexOf(id);
        if (oi >= 0) state.moduleOrder.splice(oi, 1);
      },
      addCustom: function () {
        var m = { id: newModuleId(), label: { zh: '新模块', en: 'New module' }, text: { zh: '', en: '' }, builtin: false, hidden: false };
        state.customModules.push(m);
        state.moduleOrder.push(m.id);
        scheduleSave();
        renderSnippetManager();
        renderLeft();
        focusLastRow();
      },

    };

  function focusLastRow() {
    var last = $smList && $smList.querySelector('.sm-row:last-child .sm-tag');
    if (last) { last.focus(); last.select(); }
  }
  function renderLeft() { if (SM) SM.renderLeft(); }

  // 内置句 patch（与默认相同则清除，避免冗余）
  function patchBuiltinSnippet(id, field, value) {
    var b = BUILTIN_BY_ID[id];
    if (!b) return;
    var p = state.builtinPatches[id] || {};
    if (field === 'hidden') { if (value) p.hidden = true; else delete p.hidden; }
    else { if (value === b[field]) delete p[field]; else p[field] = value; }
    if (p.tag === undefined && p.zh === undefined && p.en === undefined && !p.hidden) delete state.builtinPatches[id];
    else state.builtinPatches[id] = p;
  }
  function updateCustomSnippetField(id, field, value) {
    for (var i = 0; i < state.customSnippets.length; i++) {
      if (state.customSnippets[i].id === id) { state.customSnippets[i][field] = value; return; }
    }
  }

  // 内置模块 patch（与默认相同则清除）
  function patchBuiltinModule(id, field, value) {
    var b = MODULE_BY_ID[id];
    if (!b) return;
    var defVal;
    if (field === 'labelZh') defVal = b.label.zh;
    else if (field === 'labelEn') defVal = b.label.en;
    else if (field === 'textZh') defVal = b.text.zh;
    else if (field === 'textEn') defVal = b.text.en;
    var p = state.modulePatches[id] || {};
    if (field === 'hidden') { if (value) p.hidden = true; else delete p.hidden; }
    else { if (value === defVal) delete p[field]; else p[field] = value; }
    if (p.labelZh === undefined && p.labelEn === undefined &&
        p.textZh === undefined && p.textEn === undefined && !p.hidden) delete state.modulePatches[id];
    else state.modulePatches[id] = p;
  }
  function updateCustomModuleField(id, kind, lang, value) {
    for (var i = 0; i < state.customModules.length; i++) {
      if (state.customModules[i].id === id) { state.customModules[i][kind][lang] = value; return; }
    }
  }
  function updateCustomModuleHidden(id, hidden) {
    for (var i = 0; i < state.customModules.length; i++) {
      if (state.customModules[i].id === id) { state.customModules[i].hidden = hidden; return; }
    }
  }

  function openSnippetManager() { openManager(snippetAdapter()); }
  function openModuleManager() { openManager(moduleAdapter()); }

  function openManager(adapter) {
    ensureSnippetManager();
    SM = adapter;
    $smTitle.textContent = adapter.title;
    $smOverlay.setAttribute('aria-label', adapter.title);
    $smHint.textContent = adapter.hint;
    $smAddBtn.querySelector('.sm-add-label').textContent = adapter.addLabel;
    $smOverlay.classList.add('show');
    renderSnippetManager();
    smKeyHandler = function (e) { if (e.key === 'Escape') closeSnippetManager(); };
    document.addEventListener('keydown', smKeyHandler);
    var first = $smOverlay.querySelector('.sm-close');
    if (first) first.focus();
  }

  function closeSnippetManager() {
    if (!$smOverlay) return;
    $smOverlay.classList.remove('show');
    if (smKeyHandler) { document.removeEventListener('keydown', smKeyHandler); smKeyHandler = null; }
  }

  function moveManagerItem(id, dir) {
    var order = SM.order();
    var i = order.indexOf(id);
    if (i < 0) return;
    var j = i + dir;
    if (j < 0 || j >= order.length) return;
    var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    scheduleSave();
    renderSnippetManager();
    renderLeft();
  }

  function renderSnippetManager() {
    if (!$smList || !SM) return;
    var lang = state.lang;
    var order = SM.order();
    $smList.innerHTML = '';

    SM.ordered().forEach(function (item, idx) {
      var row = document.createElement('div');
      row.className = 'sm-row' + (item.hidden ? ' hidden' : '');
      var resetBtn = null;
      function syncReset() { if (resetBtn) resetBtn.disabled = !SM.isModified(item.id); }

      // 显示/隐藏开关
      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'sm-chk';
      chk.checked = !item.hidden;
      chk.title = item.hidden ? '已隐藏，勾选以显示' : '已显示，取消勾选以隐藏';
      chk.setAttribute('aria-label', '显示 ' + item.tagValue);
      chk.addEventListener('change', function () {
        SM.setHidden(item.id, !chk.checked);
        scheduleSave();
        renderSnippetManager();
        renderLeft();
      });
      row.appendChild(chk);

      // 主体：标签 + 内容
      var body = document.createElement('div');
      body.className = 'sm-body';

      var tag = document.createElement('input');
      tag.type = 'text';
      tag.className = 'sm-tag';
      tag.value = item.tagValue;
      tag.maxLength = SM.tagMax;
      tag.placeholder = SM.tagPlaceholder;
      tag.setAttribute('aria-label', '标签');
      tag.addEventListener('input', function () {
        SM.setTag(item.id, tag.value);
        syncReset();
        scheduleSave();
        renderLeft();
      });
      body.appendChild(tag);

      var text = document.createElement('textarea');
      text.className = 'sm-text';
      text.rows = 1;
      text.value = item.textValue;
      text.placeholder = SM.textPlaceholder(lang);
      text.setAttribute('aria-label', '内容');
      text.addEventListener('input', function () {
        SM.setText(item.id, text.value);
        autosizeSm(text);
        syncReset();
        scheduleSave();
        renderLeft();
      });
      body.appendChild(text);
      row.appendChild(body);

      // 操作区
      var ops = document.createElement('div');
      ops.className = 'sm-ops';

      var up = mkOpBtn('chevron-up', '上移', idx === 0);
      up.addEventListener('click', function () { moveManagerItem(item.id, -1); });
      var down = mkOpBtn('chevron-down', '下移', idx === order.length - 1);
      down.addEventListener('click', function () { moveManagerItem(item.id, 1); });
      ops.appendChild(up);
      ops.appendChild(down);

      if (item.builtin) {
        resetBtn = mkOpBtn('rotate-ccw', '恢复默认', !SM.isModified(item.id));
        resetBtn.addEventListener('click', function () {
          SM.reset(item.id);
          scheduleSave();
          renderSnippetManager();
          renderLeft();
        });
        ops.appendChild(resetBtn);
      } else {
        var del = mkOpBtn('x', '删除', false);
        del.classList.add('danger');
        del.addEventListener('click', function () {
          SM.deleteCustom(item.id);
          scheduleSave();
          renderSnippetManager();
          renderLeft();
        });
        ops.appendChild(del);
      }
      row.appendChild(ops);

      // 类型标记
      var badge = document.createElement('span');
      badge.className = 'sm-badge' + (item.builtin ? ' builtin' : ' custom');
      badge.textContent = item.builtin ? '内置' : '自定义';
      row.appendChild(badge);

      $smList.appendChild(row);
      autosizeSm(text);
    });
  }

  function mkOpBtn(iconName, title, disabled) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'sm-op';
    b.innerHTML = icon(iconName);
    b.title = title;
    b.setAttribute('aria-label', title);
    if (disabled) b.disabled = true;
    return b;
  }

  function autosizeSm(area) {
    area.style.height = 'auto';
    area.style.height = (area.scrollHeight) + 'px';
  }

  /* ============================================================
   * 8. 渲染：右栏编辑器 / 预览 / 状态
   * ============================================================ */
  function renderEditor() {
    if (view !== 'preview') renderBlocks();
    $etLabel.textContent = state.lang === 'zh' ? '中文正文' : 'English 正文';
    refreshStat();
    if (view === 'preview') renderPreview();
  }

  /* ---------- 块化编辑器渲染 ---------- */
  function autosize(area) {
    area.style.height = 'auto';
    area.style.height = (area.scrollHeight) + 'px';
  }

  function renderBlocks() {
    var blocks = parseBlocks(state.content[state.lang] || '');
    $blocks.innerHTML = '';

    if (blocks.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'blocks-empty';
      empty.innerHTML = '还没有内容。点左侧「插入模块」快速开始，或直接在下方新建一个块。<br>用 <code>## 标题</code> 组织段落。';
      $blocks.appendChild(empty);
      appendAddBlockButton();
      return;
    }

    blocks.forEach(function (blockText, idx) {
      $blocks.appendChild(buildBlockCard(blockText, idx));
    });
    appendAddBlockButton();
  }

  function appendAddBlockButton() {
    var add = document.createElement('button');
    add.type = 'button';
    add.className = 'block-add';
    add.innerHTML = '<span style="font-family:var(--font-mono);color:var(--amber)">+</span> 新建块';
    add.addEventListener('click', function () {
      var text = collectText();
      state.content[state.lang] = text ? (text + '\n\n## ') : '## ';
      renderBlocks();
      markLastBlockAsNew();
      refreshStat();
      scheduleSave();
      var areas = $blocks.querySelectorAll('.block-textarea');
      var last = areas[areas.length - 1];
      if (last) { last.focus(); last.setSelectionRange(last.value.length, last.value.length); }
    });
    $blocks.appendChild(add);
  }

  // 给刚新增的最后一个块打上入场动效标记，动画结束后自动移除
  function markLastBlockAsNew() {
    var cards = $blocks.querySelectorAll('.block');
    var last = cards[cards.length - 1];
    if (!last) return;
    last.classList.add('block-enter');
    last.addEventListener('animationend', function handler() {
      last.classList.remove('block-enter');
      last.removeEventListener('animationend', handler);
    });
  }

  function buildBlockCard(blockText, idx) {
    var card = document.createElement('div');
    card.className = 'block';
    card.dataset.idx = idx;

    // gutter：拖拽手柄 + 删除
    var gutter = document.createElement('div');
    gutter.className = 'block-gutter';

    var handle = document.createElement('div');
    handle.className = 'block-handle';
    handle.setAttribute('role', 'button');
    handle.setAttribute('aria-label', '拖动排序');
    handle.title = '拖动排序（或 Alt+↑/↓）';
    handle.innerHTML = icon('grip-vertical');
    attachDrag(handle, card);
    gutter.appendChild(handle);

    var del = document.createElement('button');
    del.type = 'button';
    del.className = 'block-del';
    del.setAttribute('aria-label', '删除此块');
    del.title = '删除此块';
    del.innerHTML = icon('trash-2');
    del.addEventListener('click', function () { deleteBlock(card); });
    gutter.appendChild(del);

    card.appendChild(gutter);

    // body：块内 textarea + 高亮 overlay（同一个 .hl-wrap 内像素对齐叠放）
    var body = document.createElement('div');
    body.className = 'block-body';

    var wrap = document.createElement('div');
    wrap.className = 'hl-wrap';

    var overlay = document.createElement('div');
    overlay.className = 'hl-overlay';
    overlay.setAttribute('aria-hidden', 'true');

    var area = document.createElement('textarea');
    area.className = 'block-textarea';
    area.spellcheck = false;
    area.value = blockText;
    area.rows = 1;
    area.setAttribute('aria-label', '块内容');
    area.addEventListener('input', function () {
      autosize(area);
      renderHighlight(area, overlay);
      onBlocksChanged();
    });
    area.addEventListener('scroll', function () { syncOverlayScroll(area, overlay); });
    area.addEventListener('keydown', function (e) {
      // Alt+↑/↓ 移动块
      if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
        e.preventDefault();
        moveBlock(card, e.key === 'ArrowUp' ? -1 : 1);
      }
    });

    wrap.appendChild(overlay);
    wrap.appendChild(area);
    body.appendChild(wrap);
    card.appendChild(body);

    // 初次布局后自适应高度 + 首次高亮
    renderHighlight(area, overlay);
    requestAnimationFrame(function () { autosize(area); });

    return card;
  }

  /* ---------- Markdown 语法高亮：轻量正则 + overlay 渲染 ---------- */
  // 转义 HTML 特殊字符，防止用户输入被当成标签解析（XSS 防护）
  function hlEscape(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // 对单行做行内高亮（粗体/斜体/行内代码/链接），返回已转义 + 包裹好 span 的 HTML
  // 行内代码先临时替换成“私有区字符包裹序号”的占位符，待粗体/斜体规则
  // 处理完之后再还原为高亮 span；私有区字符正常输入几乎不会产生，
  // 用它做占位符边界，比直接用纯数字更不容易和正文本身的数字冲突。
  function highlightInline(line) {
    var escaped = hlEscape(line);
    var codeTokens = [];
    // 行内代码优先处理并保护其内容不被粗体/斜体规则二次匹配
    escaped = escaped.replace(/`([^`\n]+)`/g, function (m, code) {
      codeTokens.push('<span class="hl-code">`' + code + '`</span>');
      return '' + (codeTokens.length - 1) + '';
    });
    // 链接 [text](url)
    escaped = escaped.replace(/\[([^\]\n]*)\]\(([^)\n]*)\)/g, function (m, t, u) {
      return '<span class="hl-link-text">[' + t + ']</span><span class="hl-link-url">(' + u + ')</span>';
    });
    // 粗体 **x**
    escaped = escaped.replace(/\*\*([^*\n]+)\*\*/g, '<span class="hl-bold">**$1**</span>');
    // 斜体 *x*（避免匹配到已处理过的 ** 场景，简单正则已够用）
    escaped = escaped.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<span class="hl-italic">*$2*</span>');
    // 还原行内代码 token
    escaped = escaped.replace(/(\d+)/g, function (m, i) { return codeTokens[+i]; });
    return escaped;
  }

  // 整块文本 → 高亮 HTML（按行处理：标题/列表/引用/代码围栏识别行首，其余走行内高亮）
  function highlightMarkdown(text) {
    var lines = text.split('\n');
    var inFence = false;
    var out = lines.map(function (line) {
      // 代码块围栏 ```
      if (/^\s*```/.test(line)) {
        inFence = !inFence;
        return '<span class="hl-fence">' + hlEscape(line) + '</span>';
      }
      if (inFence) return '<span class="hl-fence">' + hlEscape(line) + '</span>';

      // 标题 #, ##, ### ...
      var hMatch = line.match(/^(#{1,6})(\s.*)?$/);
      if (hMatch) return '<span class="hl-h">' + hlEscape(line) + '</span>';

      // 引用 >
      var qMatch = line.match(/^(\s*>\s?)(.*)$/);
      if (qMatch) return '<span class="hl-quote">' + hlEscape(qMatch[1]) + '</span>' + highlightInline(qMatch[2]);

      // 列表 -, *, 1.
      var lMatch = line.match(/^(\s*)([-*]|\d+\.)(\s+)(.*)$/);
      if (lMatch) {
        return hlEscape(lMatch[1]) + '<span class="hl-list">' + hlEscape(lMatch[2]) + '</span>' + hlEscape(lMatch[3]) + highlightInline(lMatch[4]);
      }

      return highlightInline(line);
    });
    return out.join('\n');
  }

  function renderHighlight(area, overlay) {
    overlay.innerHTML = highlightMarkdown(area.value);
    syncOverlayScroll(area, overlay);
  }

  function syncOverlayScroll(area, overlay) {
    overlay.scrollTop = area.scrollTop;
    overlay.scrollLeft = area.scrollLeft;
  }

  // 块内容变化：收集回写（不重建 DOM，避免打断输入）
  function onBlocksChanged() {
    collectText();
    refreshStat();
    scheduleSave();
  }

  function deleteBlock(card) {
    var area = card.querySelector('.block-textarea');
    // 有内容时二次确认，空块直接删
    if (area && area.value.trim() && !window.confirm('删除这个块？')) return;
    card.remove();
    collectText();
    refreshStat();
    scheduleSave();
    // 若删空了，重渲染以显示空态
    if ($blocks.querySelectorAll('.block').length === 0) renderBlocks();
  }

  function moveBlock(card, delta) {
    var cards = Array.prototype.slice.call($blocks.querySelectorAll('.block'));
    var i = cards.indexOf(card);
    var j = i + delta;
    if (j < 0 || j >= cards.length) return;
    var focused = document.activeElement === card.querySelector('.block-textarea');
    if (delta < 0) $blocks.insertBefore(card, cards[j]);
    else $blocks.insertBefore(cards[j], card);
    collectText();
    scheduleSave();
    if (focused) { var a = card.querySelector('.block-textarea'); if (a) a.focus(); }
  }

  /* ---------- 块拖拽（按手柄） ---------- */
  var dragBlock = null;

  function attachDrag(handle, card) {
    handle.addEventListener('pointerdown', function (e) {
      if (e.button !== 0) return;
      e.preventDefault();
      startBlockDrag(card, e);
    });
  }

  // 其它块的“让位”通过 FLIP 实现：记录旧位置 → 改变 DOM 顺序 →
  // 测新位置 → 反向 transform 归位 → 下一帧动画到 0，形成平滑滑动。
  function flipReorder(mutate) {
    var cards = Array.prototype.slice.call($blocks.querySelectorAll('.block'));
    var first = {};
    cards.forEach(function (c) { first[c.dataset.flipId] = c.getBoundingClientRect().top; });

    mutate(); // 改变 DOM 顺序

    cards.forEach(function (c) {
      if (c.classList.contains('dragging')) return; // 被拖块自行跟指针
      var oldTop = first[c.dataset.flipId];
      if (oldTop == null) return;
      var newTop = c.getBoundingClientRect().top;
      var dy = oldTop - newTop;
      if (!dy) return;
      c.classList.remove('flip');
      c.style.transform = 'translateY(' + dy + 'px)';
      // 强制回流后下一帧动画到 0
      requestAnimationFrame(function () {
        c.classList.add('flip');
        c.style.transform = '';
      });
    });
  }

  function startBlockDrag(card, ev) {
    dragBlock = card;
    document.body.style.userSelect = 'none';

    // 给每个块打一个稳定 id 供 FLIP 匹配
    Array.prototype.slice.call($blocks.querySelectorAll('.block')).forEach(function (c, i) {
      c.dataset.flipId = c.dataset.flipId || ('f' + i + '_' + Math.random().toString(36).slice(2, 6));
    });

    var rect = card.getBoundingClientRect();
    var startX = ev.clientX, startY = ev.clientY;
    var offsetY = ev.clientY - rect.top;

    // 占位块：等高，标记被拖块原位
    var placeholder = document.createElement('div');
    placeholder.className = 'block drag-placeholder';
    placeholder.dataset.flipId = 'placeholder';
    placeholder.style.height = rect.height + 'px';
    $blocks.insertBefore(placeholder, card.nextSibling);

    // 被拖块浮起：固定宽度，跟随指针
    var width = rect.width;
    card.classList.add('dragging');
    card.style.width = width + 'px';
    card.style.position = 'fixed';
    card.style.left = rect.left + 'px';
    card.style.top = rect.top + 'px';
    card.style.margin = '0';

    function moveFollow(e) {
      card.style.top = (e.clientY - offsetY) + 'px';
      card.style.left = rect.left + 'px';
    }
    moveFollow(ev);

    function onMove(e) {
      if (!dragBlock) return;
      moveFollow(e);

      // 静止块（排除被拖块与占位块本身），按 DOM 顺序
      var cards = Array.prototype.slice.call($blocks.querySelectorAll('.block'))
        .filter(function (c) { return c !== card && c !== placeholder; });

      // 指针 Y 与各静止块中点比较，决定占位块插到哪个块之前（null=末尾）
      var refNode = null;
      for (var i = 0; i < cards.length; i++) {
        var r = cards[i].getBoundingClientRect();
        if (e.clientY < r.top + r.height / 2) { refNode = cards[i]; break; }
      }

      // 占位块“在静止块序列中的当前落点”：它下一个静止兄弟（跳过 card）
      var curRef = placeholder.nextElementSibling;
      while (curRef && (curRef === card || !curRef.classList.contains('block'))) {
        curRef = curRef.nextElementSibling;
      }
      // 已在目标位置则不动，避免抖动；否则 FLIP 平滑让位
      if (refNode !== curRef) {
        flipReorder(function () {
          $blocks.insertBefore(placeholder, refNode);
        });
      }
    }

    function onUp() {
      if (!dragBlock) return cleanupListeners();
      // 松手瞬间被拖块的视觉位置（fixed 定位的 top）
      var fromTop = card.getBoundingClientRect().top;

      // 恢复流内定位，放回占位块处，测最终位置
      card.classList.remove('dragging', 'flip');
      card.style.position = '';
      card.style.top = card.style.left = card.style.width = card.style.margin = '';
      $blocks.insertBefore(card, placeholder);
      placeholder.remove();
      var toTop = card.getBoundingClientRect().top;

      // 一次 FLIP：从松手视觉位置平滑落到最终位置
      var dy = fromTop - toTop;
      if (dy) {
        card.style.transform = 'translateY(' + dy + 'px)';
        requestAnimationFrame(function () {
          card.classList.add('flip');
          card.style.transform = '';
        });
      }

      collectText();
      scheduleSave();
      cleanupListeners();
      dragBlock = null;
    }

    function cleanup() {
      if (placeholder && placeholder.parentNode) placeholder.remove();
      if (dragBlock) {
        dragBlock.classList.remove('dragging');
        dragBlock.style.position = '';
        dragBlock.style.top = dragBlock.style.left = dragBlock.style.width = dragBlock.style.margin = '';
      }
      cleanupListeners();
      dragBlock = null;
    }
    function cleanupListeners() {
      document.body.style.userSelect = '';
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    }

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  }

  function refreshStat() {
    var tokens = estimateTokens(state.content[state.lang] || '');
    $editorStat.innerHTML = '<b>~' + tokens + '</b> tokens';
  }

  function renderPreview() {
    var lang = state.lang;
    var raw = state.content[lang] || '';
    $preview.innerHTML = '';

    if (!raw.trim()) {
      var empty = document.createElement('div');
      empty.className = 'editor-preview-empty';
      empty.textContent = '正文为空，先在「编辑」里写点内容。';
      $preview.appendChild(empty);
      return;
    }

    // 按行渲染：## 开头的行做标题色，其余作为纯文本
    var lines = raw.split('\n');
    lines.forEach(function (line, i) {
      if (/^##\s?/.test(line)) {
        var h = document.createElement('span');
        h.className = 'pv-h';
        h.textContent = line;
        $preview.appendChild(h);
      } else {
        $preview.appendChild(document.createTextNode(line));
      }
      if (i < lines.length - 1) $preview.appendChild(document.createTextNode('\n'));
    });
  }

  /* ============================================================
   * 9. 语言 / 视图切换
   * ============================================================ */
  function setLang(lang) {
    if (state.lang === lang) return;
    // 切换前把当前编辑内容存回（仅编辑模式下 DOM 才是最新）
    if (view !== 'preview') collectText();
    state.lang = lang;
    renderAll();
    scheduleSave();
  }
  function toggleLang() { setLang(state.lang === 'zh' ? 'en' : 'zh'); }

  function renderLangSeg() {
    $langSegmented.querySelectorAll('button').forEach(function (b) {
      b.setAttribute('aria-pressed', b.dataset.lang === state.lang ? 'true' : 'false');
    });
  }
  $langSegmented.addEventListener('click', function (e) {
    var b = e.target.closest('button[data-lang]');
    if (b) setLang(b.dataset.lang);
  });

  function setView(v) {
    if (view === v) return;
    if (v === 'preview') collectText(); // 进预览前把块内容存回
    view = v;
    renderViewSeg();
    if (view === 'preview') {
      $blocks.hidden = true;
      $preview.hidden = false;
      renderPreview();
    } else {
      $preview.hidden = true;
      $blocks.hidden = false;
      renderBlocks();
    }
  }
  function toggleView() { setView(view === 'write' ? 'preview' : 'write'); }

  function renderViewSeg() {
    $viewSeg.querySelectorAll('button').forEach(function (b) {
      b.setAttribute('aria-pressed', b.dataset.view === view ? 'true' : 'false');
    });
  }
  $viewSeg.addEventListener('click', function (e) {
    var b = e.target.closest('button[data-view]');
    if (b) setView(b.dataset.view);
  });

  /* ============================================================
   * 10. 输出：复制 / 下载 / 示例 / 清空
   * ============================================================ */
  function doCopy() {
    if (view !== 'preview') collectText();
    var text = state.content[state.lang] || '';
    var langName = state.lang === 'zh' ? '中文' : 'English';
    if (clipboardApi && clipboardApi.writeText) {
      clipboardApi.writeText(text).then(function () { showToast('已复制' + langName + '提示词'); }).catch(function () { fallbackCopy(text, langName); });
    } else {
      fallbackCopy(text, langName);
    }
  }
  function fallbackCopy(text, langName) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { showToast('已复制' + langName + '提示词'); }).catch(function () { showToast('复制失败', true); });
    } else { showToast('复制失败：当前环境不支持', true); }
  }

  function doDownload() {
    if (view !== 'preview') collectText();
    var text = state.content[state.lang] || '';
    var defaultName = state.lang === 'zh' ? 'prompt-zh.md' : 'prompt-en.md';
    var langName = state.lang === 'zh' ? '中文' : 'English';
    if (dialogApi && dialogApi.save && fsApi && fsApi.writeTextFile) {
      dialogApi.save({ defaultPath: defaultName, filters: [{ name: 'Markdown', extensions: ['md'] }] })
        .then(function (filePath) {
          if (!filePath) return;
          return fsApi.writeTextFile(filePath, text).then(function () { showToast('已下载' + langName + '提示词'); });
        })
        .catch(function () { showToast('下载失败', true); });
    } else {
      var blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = defaultName;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showToast('已下载' + langName + '提示词');
    }
  }

  $btnCopy.addEventListener('click', doCopy);
  $btnDownload.addEventListener('click', doDownload);

  var $btnManageSnippets = document.getElementById('btnManageSnippets');
  if ($btnManageSnippets) $btnManageSnippets.addEventListener('click', openSnippetManager);
  var $btnManageModules = document.getElementById('btnManageModules');
  if ($btnManageModules) $btnManageModules.addEventListener('click', openModuleManager);

  var $btnCheckUpdate = document.getElementById('btnCheckUpdate');
  if ($btnCheckUpdate) $btnCheckUpdate.addEventListener('click', function () { checkForUpdate(true); });

  var $themeToggle = document.getElementById('themeToggle');
  $themeToggle.addEventListener('click', function () {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (dark) {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    try { localStorage.setItem('composer-theme', dark ? 'light' : 'dark'); } catch (e) {}
  });

  $btnLoadDemo.addEventListener('click', function () {
    state.content = demoContent();
    if (view === 'preview') setView('write');
    renderAll();
    scheduleSave();
    showToast('已载入模板');
  });

  $btnClearAll.addEventListener('click', function () {
    if (!(state.content[state.lang] || '').trim()) { showToast('当前语言正文已经是空的'); return; }
    state.content[state.lang] = '';
    if (view === 'preview') setView('write');
    renderAll();
    scheduleSave();
    showToast('已清空' + (state.lang === 'zh' ? '中文' : 'English') + '正文');
  });

  /* ============================================================
   * 11. 快捷键
   * ============================================================ */
  document.addEventListener('keydown', function (e) {
    if (!(e.ctrlKey || e.metaKey)) return;
    var key = e.key.toLowerCase();
    if (key === 'l') { e.preventDefault(); toggleLang(); }
    else if (key === 's') { e.preventDefault(); doDownload(); }
    else if (key === 'p') { e.preventDefault(); toggleView(); }
    else if (key === 'c') {
      var sel = window.getSelection && window.getSelection().toString();
      var tag = document.activeElement && document.activeElement.tagName;
      var inField = tag === 'INPUT' || tag === 'TEXTAREA';
      if (!sel && !inField) { e.preventDefault(); doCopy(); }
    }
  });

  /* ============================================================
   * 12. 检查更新
   * ============================================================ */
  var checkingUpdate = false;
  function checkForUpdate(manual) {
    if (!updaterApi) { if (manual) showToast('当前环境不支持自动更新'); return; }
    if (checkingUpdate) return;
    checkingUpdate = true;
    updaterApi.check().then(function (update) {
      checkingUpdate = false;
      if (!update) { if (manual) showToast('已是最新版本'); return; }
      var ok = window.confirm('发现新版本 ' + update.version + '，是否立即下载并安装？\n\n' + (update.body || ''));
      if (!ok) return;
      showToast('正在下载更新…');
      update.downloadAndInstall().then(function () {
        showToast('更新完成，即将重启');
        if (processApi) processApi.relaunch();
      }).catch(function (err) {
        showToast('更新安装失败：' + (err && err.message ? err.message : err), true);
      });
    }).catch(function (err) {
      checkingUpdate = false;
      if (manual) showToast('检查更新失败：' + (err && err.message ? err.message : err), true);
    });
  }

  /* ============================================================
   * 13. 汇总渲染
   * ============================================================ */
  function renderAll() {
    renderLangSeg();
    renderViewSeg();
    renderInsertGrid();
    renderSnippets();
    renderEditor();
    if ($smOverlay && $smOverlay.classList.contains('show')) renderSnippetManager();
  }

  restoreState();
  setTimeout(function () { checkForUpdate(false); }, 3000);
})();
</script>
</body>
</html>
