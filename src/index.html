<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Composer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#1b2431; --ink-soft:#2a3646; --rail:#182029;
    --page:#e9ebee; --card:#ffffff; --line:#dfe2e7; --line-soft:#eceef1;
    --text:#1b2431; --muted:#6b7684; --faint:#9aa2ad;
    --accent:#524bd6; --accent-soft:#ecebfb; --accent-ink:#332e9c;
    --warn:#c8452f; --warn-soft:#fbeae6;
    --save:#0f6e56; --save-soft:#e1f5ee;
    --radius:9px;
    --font-display:'Space Grotesk', system-ui, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-sans:-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family:var(--font-sans);
    font-size:14px;
    color:var(--text);
    background:var(--page);
    height:100vh;
    overflow:hidden;
    display:grid;
    grid-template-columns:264px 1fr 388px;
  }

  ::selection { background:var(--accent-soft); color:var(--accent-ink); }

  button, input, textarea { font-family:inherit; font-size:inherit; color:inherit; }

  :focus-visible {
    outline:2px solid var(--accent);
    outline-offset:2px;
    border-radius:4px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  /* ---------- 左栏：模块库 ---------- */
  .rail {
    background:var(--rail);
    color:#c7cdd6;
    display:flex;
    flex-direction:column;
    padding:20px 18px;
    overflow-y:auto;
    min-width:0;
  }
  .brand { display:flex; align-items:center; gap:8px; }
  .brand-name { font-family:var(--font-display); font-weight:700; font-size:22px; color:#fff; letter-spacing:-0.01em; }
  .brand-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex:none; }
  .rail-tagline {
    margin-top:6px;
    font-size:11px;
    letter-spacing:0.08em;
    color:#79828e;
    text-transform:none;
  }
  .rail-section-title {
    margin-top:28px;
    margin-bottom:12px;
    font-size:12px;
    font-weight:600;
    color:#8d95a1;
  }
  .module-lib {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .lib-pill {
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:6px 12px;
    border-radius:999px;
    background:#222c38;
    border:1px solid #2f3b49;
    color:#c7cdd6;
    cursor:pointer;
    font-size:12.5px;
    transition:background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    white-space:nowrap;
  }
  .lib-pill:hover {
    background:#2a3644;
    border-color:var(--accent);
    color:#fff;
  }
  .lib-pill .plus { font-family:var(--font-display); font-weight:700; color:var(--accent); }
  .lib-pill:hover .plus { color:#a9a3ff; }

  .rail-bottom {
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-top:24px;
  }
  .btn-ghost-rail {
    background:transparent;
    border:1px solid #333f4d;
    color:#c7cdd6;
    border-radius:var(--radius);
    padding:9px 12px;
    cursor:pointer;
    font-size:13px;
    text-align:center;
    transition:border-color 0.12s ease, color 0.12s ease, background 0.12s ease;
  }
  .btn-ghost-rail:hover { border-color:var(--accent); color:#fff; background:#202b37; }

  /* ---------- 中栏：装配区 ---------- */
  .assembly {
    overflow-y:auto;
    padding:24px 28px 40px;
    min-width:0;
  }
  .assembly-head {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .assembly-title {
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
    color:var(--ink);
  }
  .segmented {
    display:inline-flex;
    background:#dcdfe4;
    border-radius:999px;
    padding:3px;
    gap:2px;
  }
  .segmented button {
    border:none;
    background:transparent;
    padding:6px 16px;
    border-radius:999px;
    cursor:pointer;
    color:var(--muted);
    font-size:13px;
    font-weight:500;
    transition:background 0.12s ease, color 0.12s ease;
  }
  .segmented button[aria-pressed="true"] {
    background:#fff;
    color:var(--ink);
    box-shadow:0 1px 2px rgba(0,0,0,0.08);
  }

  .assembly-hint {
    margin-top:8px;
    font-size:12.5px;
    color:var(--muted);
    line-height:1.6;
  }
  .var-chip-inline {
    display:inline-block;
    background:var(--accent-soft);
    color:var(--accent-ink);
    border-radius:999px;
    padding:1px 8px;
    font-family:var(--font-mono);
    font-size:11.5px;
  }

  .module-list {
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .empty-state {
    margin-top:20px;
    border:1.5px dashed var(--line);
    border-radius:var(--radius);
    padding:48px 24px;
    text-align:center;
    color:var(--faint);
  }
  .empty-state .line1 { font-size:14.5px; color:var(--muted); margin-bottom:4px; }
  .empty-state .line2 { font-size:13px; }

  /* ---------- 模块卡片 ---------- */
  .module-card {
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px 16px;
    transition:opacity 0.15s ease;
  }
  .module-card.disabled { opacity:0.5; }

  .card-head {
    display:flex;
    align-items:center;
    gap:10px;
  }
  .drag-handle {
    color:var(--faint);
    font-size:15px;
    cursor:grab;
    user-select:none;
    flex:none;
  }
  .card-title-input {
    flex:1;
    min-width:0;
    border:none;
    background:transparent;
    font-family:var(--font-display);
    font-weight:700;
    font-size:15px;
    color:var(--ink);
    padding:4px 6px;
    border-radius:6px;
  }
  .card-title-input:hover { background:var(--line-soft); }
  .card-actions {
    display:flex;
    align-items:center;
    gap:4px;
    flex:none;
  }
  .icon-btn {
    width:26px;
    height:26px;
    border:none;
    background:transparent;
    border-radius:6px;
    cursor:pointer;
    color:var(--muted);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    transition:background 0.12s ease, color 0.12s ease;
  }
  .icon-btn:hover:not(:disabled) { background:var(--accent-soft); color:var(--accent-ink); }
  .icon-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .icon-btn.danger:hover:not(:disabled) { background:var(--warn-soft); color:var(--warn); }

  .switch {
    width:36px;
    height:20px;
    border-radius:999px;
    background:var(--line);
    border:none;
    cursor:pointer;
    position:relative;
    flex:none;
    transition:background 0.15s ease;
    margin-left:4px;
  }
  .switch::after {
    content:'';
    position:absolute;
    top:2px;
    left:2px;
    width:16px;
    height:16px;
    border-radius:50%;
    background:#fff;
    transition:transform 0.15s ease;
  }
  .switch[aria-pressed="true"] { background:var(--accent); }
  .switch[aria-pressed="true"]::after { transform:translateX(16px); }

  .card-body { margin-top:10px; }
  .content-label {
    font-size:11px;
    color:var(--faint);
    margin-bottom:6px;
  }
  .card-textarea {
    width:100%;
    min-height:76px;
    resize:vertical;
    border:1px solid var(--line);
    border-radius:7px;
    padding:9px 10px;
    font-family:var(--font-mono);
    font-size:12.5px;
    line-height:1.6;
    color:var(--text);
    background:#fbfbfc;
  }
  .card-textarea:focus { border-color:var(--accent); background:#fff; }

  .snippet-row {
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:6px;
  }
  .snippet-label {
    font-size:11px;
    color:var(--faint);
    margin-right:2px;
  }
  .snippet-pill {
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:var(--line-soft);
    border:1px solid var(--line);
    border-radius:999px;
    padding:4px 10px;
    font-size:11.5px;
    color:var(--ink-soft);
    cursor:pointer;
    transition:background 0.12s ease, border-color 0.12s ease;
  }
  .snippet-pill:hover { background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink); }
  .snippet-pill .remove-x {
    color:var(--faint);
    font-size:12px;
    margin-left:2px;
    border-radius:50%;
  }
  .snippet-pill .remove-x:hover { color:var(--warn); }
  .snippet-add {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:24px;
    height:24px;
    border-radius:999px;
    border:1.5px dashed var(--faint);
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    font-size:13px;
  }
  .snippet-add:hover { border-color:var(--accent); color:var(--accent); }
  .snippet-add-input {
    border:1px solid var(--accent);
    border-radius:999px;
    padding:4px 10px;
    font-size:11.5px;
    min-width:160px;
  }

  /* ---------- 右栏：检视面板 ---------- */
  .inspector {
    background:var(--card);
    border-left:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-width:0;
    overflow:hidden;
  }
  .var-panel {
    max-height:32%;
    display:flex;
    flex-direction:column;
    padding:20px 20px 14px;
    border-bottom:1px solid var(--line);
    min-height:0;
  }
  .panel-title {
    font-family:var(--font-display);
    font-weight:700;
    font-size:15px;
    color:var(--ink);
  }
  .panel-subtext {
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
    margin-bottom:10px;
  }
  .var-list {
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    min-height:0;
  }
  .var-row {
    display:flex;
    align-items:center;
    gap:8px;
  }
  .var-name-chip {
    font-family:var(--font-mono);
    font-size:11.5px;
    background:var(--accent-soft);
    color:var(--accent-ink);
    border-radius:6px;
    padding:5px 8px;
    flex:none;
    max-width:108px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .var-name-chip.empty { background:var(--warn-soft); color:var(--warn); }
  .var-value-input {
    flex:1;
    min-width:0;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 9px;
    font-size:12.5px;
  }
  .var-value-input:focus { border-color:var(--accent); }
  .var-empty-hint { font-size:12px; color:var(--faint); padding:6px 2px; }

  .output-panel {
    flex:1;
    display:flex;
    flex-direction:column;
    padding:18px 20px 20px;
    min-height:0;
    overflow-y:auto;
  }
  .lang-cards {
    display:flex;
    gap:10px;
    margin-top:12px;
  }
  .lang-card {
    flex:1;
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:12px 14px;
    cursor:pointer;
    background:#fff;
    text-align:left;
    position:relative;
    transition:border-color 0.12s ease, background 0.12s ease;
  }
  .lang-card:hover { border-color:var(--accent); }
  .lang-card.active {
    border-color:var(--accent);
    background:var(--accent-soft);
  }
  .lang-card .lc-name {
    font-size:12.5px;
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .lang-card.active .lc-name { color:var(--accent-ink); }
  .lang-card .lc-tokens {
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    color:var(--ink);
    margin-top:4px;
  }
  .lang-card .lc-current {
    font-size:10.5px;
    color:var(--accent-ink);
    font-weight:600;
  }
  .save-badge {
    display:inline-block;
    margin-top:6px;
    background:var(--save-soft);
    color:var(--save);
    font-size:10.5px;
    font-weight:600;
    padding:2px 7px;
    border-radius:999px;
  }

  .preview-head {
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    margin-top:22px;
    flex-wrap:wrap;
  }
  .preview-title {
    font-family:var(--font-display);
    font-weight:700;
    font-size:14.5px;
    color:var(--ink);
  }
  .preview-edit-hint {
    font-size:11px;
    color:var(--faint);
  }

  .preview-box {
    margin-top:10px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:#fbfbfc;
    padding:14px 16px;
    font-family:var(--font-mono);
    font-size:12.5px;
    line-height:1.85;
    color:var(--text);
    white-space:pre-wrap;
    word-break:break-word;
    flex:1;
    overflow-y:auto;
    min-height:120px;
  }
  .preview-box .p-heading {
    font-weight:700;
    cursor:text;
    border-radius:4px;
    padding:1px 3px;
    margin-left:-3px;
  }
  .preview-box .p-heading:hover { background:var(--accent-soft); }
  .preview-box .p-body {
    cursor:text;
    border-radius:4px;
    display:block;
    padding:1px 3px;
    margin-left:-3px;
  }
  .preview-box .p-body:hover { background:var(--line-soft); }
  .preview-box .p-var {
    display:inline-block;
    background:var(--accent-soft);
    color:var(--accent-ink);
    border-radius:5px;
    padding:0 5px;
    cursor:pointer;
  }
  .preview-box .p-var:hover { background:#ddd9fb; }
  .preview-box .p-var.unfilled {
    background:var(--warn-soft);
    color:var(--warn);
  }
  .preview-box .p-var.unfilled:hover { background:#f6d9d1; }
  .preview-box .p-block { margin-bottom:14px; }
  .preview-box .p-block:last-child { margin-bottom:0; }
  .preview-inline-input {
    font-family:var(--font-mono);
    font-size:12.5px;
    border:1px solid var(--accent);
    border-radius:5px;
    padding:0 5px;
    min-width:60px;
  }
  .preview-inline-textarea {
    width:100%;
    font-family:var(--font-mono);
    font-size:12.5px;
    line-height:1.8;
    border:1px solid var(--accent);
    border-radius:6px;
    padding:8px 10px;
    resize:vertical;
    min-height:70px;
  }
  .preview-inline-title-input {
    font-family:var(--font-display);
    font-weight:700;
    font-size:12.5px;
    border:1px solid var(--accent);
    border-radius:5px;
    padding:1px 4px;
  }

  .preview-stats {
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
  }
  .preview-stats .stat-bad { color:var(--warn); font-weight:600; }

  .output-actions {
    display:flex;
    gap:10px;
    margin-top:14px;
  }
  .btn {
    flex:1;
    border-radius:var(--radius);
    padding:10px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    border:1px solid transparent;
    transition:background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-ink); }
  .btn-outline { background:#fff; border-color:var(--line); color:var(--ink); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent-ink); }

  /* ---------- Toast ---------- */
  .toast {
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(8px);
    background:var(--ink);
    color:#fff;
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.18s ease, transform 0.18s ease;
    z-index:999;
  }
  .toast.show {
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  /* ---------- 响应式 ---------- */
  @media (max-width: 899px) {
    body {
      grid-template-columns:1fr;
      grid-auto-rows:auto;
      height:auto;
      min-height:100vh;
      overflow:auto;
    }
    .rail, .assembly, .inspector { overflow:visible; }
    .var-panel { max-height:none; }
    .inspector { border-left:none; border-top:1px solid var(--line); }
  }

  /* ---------- 滚动条细节 ---------- */
  .rail::-webkit-scrollbar, .assembly::-webkit-scrollbar, .var-list::-webkit-scrollbar,
  .output-panel::-webkit-scrollbar, .preview-box::-webkit-scrollbar { width:8px; }
  .rail::-webkit-scrollbar-thumb { background:#2a3644; border-radius:4px; }
  .assembly::-webkit-scrollbar-thumb, .var-list::-webkit-scrollbar-thumb,
  .output-panel::-webkit-scrollbar-thumb, .preview-box::-webkit-scrollbar-thumb { background:#d3d6db; border-radius:4px; }
</style>
</head>
<body>

  <!-- ========== 左栏：模块库 ========== -->
  <aside class="rail">
    <div class="brand">
      <span class="brand-name">Composer</span>
      <span class="brand-dot" aria-hidden="true"></span>
    </div>
    <div class="rail-tagline">模块化提示词构建工具</div>

    <div class="rail-section-title">添加模块</div>
    <div class="module-lib" id="moduleLib" role="list"></div>

    <div class="rail-bottom">
      <button class="btn-ghost-rail" id="btnLoadDemo" type="button">载入示例</button>
      <button class="btn-ghost-rail" id="btnClearAll" type="button">全部清空</button>
    </div>
  </aside>

  <!-- ========== 中栏：装配区 ========== -->
  <main class="assembly">
    <div class="assembly-head">
      <div class="assembly-title">装配区</div>
      <div class="segmented" id="langSegmented" role="group" aria-label="切换语言">
        <button type="button" data-lang="zh" aria-pressed="true">中文</button>
        <button type="button" data-lang="en" aria-pressed="false">English</button>
      </div>
    </div>
    <div class="assembly-hint">
      切换语言可分别编辑中英两版内容。变量名共用，值按语言分别填写。在任意位置输入 <span class="var-chip-inline">{{名称}}</span> 即可创建变量。
    </div>

    <div class="module-list" id="moduleList"></div>
    <div class="empty-state" id="emptyState" hidden>
      <div class="line1">还没有装配任何内容</div>
      <div class="line2">从左侧添加一个模块开始构建</div>
    </div>
  </main>

  <!-- ========== 右栏：检视面板 ========== -->
  <aside class="inspector">
    <section class="var-panel">
      <div class="panel-title">变量</div>
      <div class="panel-subtext" id="varSubtext">当前编辑：中文的变量值</div>
      <div class="var-list" id="varList"></div>
    </section>

    <section class="output-panel">
      <div class="panel-title">输出语言与 Token 估算</div>
      <div class="lang-cards" id="langCards">
        <button type="button" class="lang-card" data-lang="zh" id="cardZh">
          <div class="lc-name"><span>中文</span></div>
          <div class="lc-tokens" id="tokensZh">~0 tokens</div>
        </button>
        <button type="button" class="lang-card" data-lang="en" id="cardEn">
          <div class="lc-name"><span>English</span></div>
          <div class="lc-tokens" id="tokensEn">~0 tokens</div>
        </button>
      </div>

      <div class="preview-head">
        <div class="preview-title" id="previewTitle">编译后的提示词 · 中文</div>
        <div class="preview-edit-hint">点击标题、正文或变量即可直接编辑</div>
      </div>
      <div class="preview-box" id="previewBox"></div>
      <div class="preview-stats" id="previewStats"></div>

      <div class="output-actions">
        <button class="btn btn-outline" id="btnCopy" type="button">复制</button>
        <button class="btn btn-primary" id="btnDownload" type="button">下载 .md</button>
      </div>
    </section>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function () {
  'use strict';

  /* ============================================================
   * 0. Tauri API 安全获取（浏览器中预览时降级为空实现）
   * ============================================================ */
  var TAURI = window.__TAURI__ || null;

  /* ============================================================

  var state = defaultState();

  function scheduleSave() {

  var appDataEnsured = false;
  function ensureAppDataDir() {
    // 首次写入前确保 AppData 目录存在（目录已存在时 recursive 静默通过）。
    if (appDataEnsured || !fsApi.mkdir) return Promise.resolve();
    return fsApi.mkdir('.', { baseDir: BaseDirectory.AppData, recursive: true })
      .then(function () { appDataEnsured = true; })
      .catch(function () { appDataEnsured = true; });
  }

  function persistState() {
    if (!tauriAvailable()) return;
    var payload = JSON.stringify(state, null, 2);
    ensureAppDataDir().then(function () {
      return fsApi.writeTextFile(STATE_FILE, payload, { baseDir: BaseDirectory.AppData });
    }).catch(function (err) { console.warn('持久化失败:', err); });
  }

  function restoreState() {
    if (!tauriAvailable()) {
      restored = true;
      renderAll();
      return;
    }
    fsApi.exists(STATE_FILE, { baseDir: BaseDirectory.AppData })
      .then(function (exists) {
        if (!exists) throw new Error('no-state-file');
        return fsApi.readTextFile(STATE_FILE, { baseDir: BaseDirectory.AppData });
      })
      .then(function (text) {
        var parsed = JSON.parse(text);
        if (parsed && typeof parsed === 'object') {
          state = normalizeState(parsed);
        }
      })
      .catch(function () {
        state = defaultState();
      })
      .then(function () {
        restored = true;
        renderAll();
      });
  }

  function normalizeState(raw) {
    var s = defaultState();
    s.lang = (raw.lang === 'en') ? 'en' : 'zh';
    if (Array.isArray(raw.modules)) {
      s.modules = raw.modules.map(function (m) {
        return {
          id: m.id || uid(),
          enabled: m.enabled !== false,
          label: { zh: (m.label && m.label.zh) || '', en: (m.label && m.label.en) || '' },
          content: { zh: (m.content && m.content.zh) || '', en: (m.content && m.content.en) || '' }
        };
      });
    }
    if (raw.values && typeof raw.values === 'object') {
      s.values = {};
      Object.keys(raw.values).forEach(function (k) {
        var v = raw.values[k] || {};
        s.values[k] = { zh: v.zh || '', en: v.en || '' };
      });
    }
    if (Array.isArray(raw.customSnippets)) {
      s.customSnippets = raw.customSnippets.filter(function (sn) {
        return sn && typeof sn.tag === 'string';
      });
    }
    return s;
  }

  /* ============================================================
   * 3. 变量提取 / 编译 / Token 估算
   * ============================================================ */
  var VAR_RE = /\{\{\s*([^{}]+?)\s*\}\}/g;

  function extractVarNames(text) {
    var names = [];
    var seen = {};
    var m;
    VAR_RE.lastIndex = 0;
    while ((m = VAR_RE.exec(text || '')) !== null) {
      var name = m[1];
      if (!seen[name]) {
        seen[name] = true;
        names.push(name);
      }
    }
    return names;
  }

  function collectAllVarNames() {
    var names = [];
    var seen = {};
    state.modules.forEach(function (mod) {
      ['zh', 'en'].forEach(function (lang) {
        extractVarNames(mod.content[lang]).forEach(function (n) {
          if (!seen[n]) { seen[n] = true; names.push(n); }
        });
      });
    });
    return names;
  }

  function ensureValueEntry(name) {
    if (!state.values[name]) {
      state.values[name] = { zh: '', en: '' };
    }
    return state.values[name];
  }

  function syncValuesWithVars() {
    var names = collectAllVarNames();
    names.forEach(ensureValueEntry);
  }

  function compilePrompt(lang) {
    var blocks = state.modules.filter(function (m) { return m.enabled; });
    var parts = blocks.map(function (mod) {
      var label = mod.label[lang] || mod.label.zh || mod.label.en || '';
      var content = mod.content[lang] || '';
      var substituted = content.replace(VAR_RE, function (full, name) {
        var entry = state.values[name];
        var val = entry ? entry[lang] : '';
        return val ? val : full;
      });
      return '## ' + label + '\n' + substituted;
    });
    return parts.join('\n\n');
  }

  function estimateTokens(text) {
    // 启发式估算：CJK 字符按 1.6 计，其余字符按每 4 字符 1 累计；仅供参考。
    if (!text) return 0;
    var cjkCount = 0;
    var otherCount = 0;
    for (var i = 0; i < text.length; i++) {
      var code = text.codePointAt(i);
      var isCjk = (code >= 0x3000 && code <= 0x303f) ||
                  (code >= 0x3400 && code <= 0x9fff) ||
                  (code >= 0xff00 && code <= 0xffef);
      if (isCjk) cjkCount++;
      else otherCount++;
    }
    var tokens = cjkCount * 1.6 + otherCount / 4;
    return Math.round(tokens);
  }

  function insertSnippet(textarea, sentence) {
    var hasFocus = document.activeElement === textarea;
    var value = textarea.value;
    if (hasFocus) {
      var start = textarea.selectionStart;
      var end = textarea.selectionEnd;
      var before = value.slice(0, start);
      var needsNewline = before.length > 0 && !before.endsWith('\n');
      var insertText = (needsNewline ? '\n' : '') + sentence;
      var newValue = before + insertText + value.slice(end);
      textarea.value = newValue;
      var caret = before.length + insertText.length;
      textarea.focus();
      textarea.setSelectionRange(caret, caret);
    } else {
      var needsNl = value.length > 0 && !value.endsWith('\n');
      textarea.value = value + (needsNl ? '\n' : '') + sentence;
    }
  }

  function openSnippetAddInput(row, addBtn) {
    if (row.querySelector('.snippet-add-input')) return;
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'snippet-add-input';
    input.placeholder = '输入常用句，回车保存';
    row.insertBefore(input, addBtn);
    input.focus();

    function commit() {
      var text = input.value.trim();
      if (text) {
        var tag = text.length > 8 ? (text.slice(0, 8) + '…') : text;
        state.customSnippets.push({ tag: tag, zh: text, en: text, builtin: false });
        renderModuleList();
        scheduleSave();
      } else {
        input.remove();
      }
    }
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        commit();
      } else if (e.key === 'Escape') {
        input.remove();
      }
    });
    input.addEventListener('blur', function () {
      setTimeout(commit, 0);
    });
  }

  function moveModule(idx, delta) {
    var newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= state.modules.length) return;
    var arr = state.modules;
    var tmp = arr[idx];
    arr[idx] = arr[newIdx];
    arr[newIdx] = tmp;
    renderAll();
    scheduleSave();
  }

      hint.textContent = '暂无变量，在模块内容中输入 {{名称}} 即可创建。';
      $varList.appendChild(hint);
      return;
    }
    names.forEach(function (name) {
      var entry = ensureValueEntry(name);
      var row = document.createElement('div');
      row.className = 'var-row';

      var chip = document.createElement('span');
      var isEmpty = !entry[lang];
      chip.className = 'var-name-chip' + (isEmpty ? ' empty' : '');
      chip.textContent = name;
      chip.title = name;
      row.appendChild(chip);

      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'var-value-input';
      input.value = entry[lang] || '';
      input.setAttribute('aria-label', '变量 ' + name + ' 的值');
      input.placeholder = '填写变量值…';
      input.addEventListener('input', function () {
        entry[lang] = input.value;
        chip.classList.toggle('empty', !input.value);
        renderPreview();
        scheduleSave();
      });
      row.appendChild(input);

      $varList.appendChild(row);
    });
  }

  /* ============================================================
   * 9. Token 对比卡
   * ============================================================ */
  function renderTokenCards() {
    var zhText = compilePrompt('zh');
    var enText = compilePrompt('en');
    var zhTokens = estimateTokens(zhText);
    var enTokens = estimateTokens(enText);

    $tokensZh.textContent = '~' + zhTokens + ' tokens';
    $tokensEn.textContent = '~' + enTokens + ' tokens';

    [$cardZh, $cardEn].forEach(function (card) {
      var existingCurrent = card.querySelector('.lc-current');
      if (existingCurrent) existingCurrent.remove();
      var existingBadge = card.querySelector('.save-badge');
      if (existingBadge) existingBadge.remove();
      card.classList.remove('active');
    });

    var activeCard = state.lang === 'zh' ? $cardZh : $cardEn;
    activeCard.classList.add('active');
    var nameRow = activeCard.querySelector('.lc-name');
    var currentTag = document.createElement('span');
    currentTag.className = 'lc-current';
    currentTag.textContent = '· 当前输出';
    nameRow.appendChild(currentTag);

    var maxTokens = Math.max(zhTokens, enTokens);
    var minTokens = Math.min(zhTokens, enTokens);
    if (maxTokens > 0 && zhTokens !== enTokens) {
      var cheaperLang = zhTokens < enTokens ? 'zh' : 'en';
      if (cheaperLang !== state.lang) {
        var cheaperCard = cheaperLang === 'zh' ? $cardZh : $cardEn;
        var pct = Math.round((1 - minTokens / maxTokens) * 100);
        var badge = document.createElement('div');
        badge.className = 'save-badge';
        badge.textContent = '省约 ' + pct + '%';
        cheaperCard.appendChild(badge);
      }
    }
  }

  /* ============================================================
   * 10. 编译预览 + 内联编辑
   * ============================================================ */
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderPreview() {
    var lang = state.lang;
    $previewTitle.textContent = '编译后的提示词 · ' + (lang === 'zh' ? '中文' : 'English');

    var enabledModules = state.modules.filter(function (m) { return m.enabled; });
    $previewBox.innerHTML = '';

    if (enabledModules.length === 0) {
      var emptyP = document.createElement('div');
      emptyP.style.color = 'var(--faint)';
      emptyP.textContent = '暂无内容，从左侧添加模块开始构建。';
      $previewBox.appendChild(emptyP);
    } else {
      enabledModules.forEach(function (mod) {
        var modIndex = state.modules.indexOf(mod);
        var block = document.createElement('div');
        block.className = 'p-block';

        var heading = document.createElement('div');
        heading.className = 'p-heading';
        heading.textContent = '## ' + (mod.label[lang] || '');
        heading.tabIndex = 0;
        heading.setAttribute('role', 'button');
        heading.setAttribute('aria-label', '编辑模块标题');
        heading.addEventListener('click', function () {
          editHeading(heading, mod, lang, modIndex);
        });
        block.appendChild(heading);

        var bodyEl = document.createElement('div');
        bodyEl.className = 'p-body';
        renderBodyContent(bodyEl, mod, lang, modIndex);
        block.appendChild(bodyEl);

        $previewBox.appendChild(block);
      });
    }

    renderPreviewStats();
    renderTokenCards();
  }

  function editHeading(headingEl, mod, lang, modIndex) {
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'preview-inline-title-input';
    input.value = mod.label[lang] || '';
    headingEl.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      mod.label[lang] = input.value;
      renderModuleList();
      renderPreview();
      scheduleSave();
    }
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      else if (e.key === 'Escape') { input.value = mod.label[lang] || ''; input.blur(); }
    });
    input.addEventListener('blur', commit);
  }

  function renderBodyContent(bodyEl, mod, lang, modIndex) {
    bodyEl.innerHTML = '';
    bodyEl.tabIndex = 0;
    var raw = mod.content[lang] || '';
    var names = extractVarNames(raw);

    if (names.length === 0) {
      bodyEl.appendChild(document.createTextNode(raw));
    } else {
      var lastIndex = 0;
      VAR_RE.lastIndex = 0;
      var m;
      while ((m = VAR_RE.exec(raw)) !== null) {
        if (m.index > lastIndex) {
          bodyEl.appendChild(document.createTextNode(raw.slice(lastIndex, m.index)));
        }
        var varName = m[1];
        var entry = state.values[varName] || { zh: '', en: '' };
        var val = entry[lang];
        var chip = document.createElement('span');
        chip.className = 'p-var' + (val ? '' : ' unfilled');
        chip.textContent = val ? val : m[0];
        chip.setAttribute('role', 'button');
        chip.setAttribute('aria-label', '编辑变量 ' + varName);
        chip.tabIndex = 0;
        (function (varNameClosure) {
          chip.addEventListener('click', function (e) {
            e.stopPropagation();
            editVarChip(chip, varNameClosure, lang);
          });
        })(varName);
        bodyEl.appendChild(chip);
        lastIndex = m.index + m[0].length;
      }
      if (lastIndex < raw.length) {
        bodyEl.appendChild(document.createTextNode(raw.slice(lastIndex)));
      }
    }

    bodyEl.addEventListener('click', function bodyClickHandler(e) {
      if (e.target !== bodyEl) return;
      switchBodyToTextarea(bodyEl, mod, lang, modIndex);
    });
  }

  function editVarChip(chipEl, varName, lang) {
    var entry = ensureValueEntry(varName);
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'preview-inline-input';
    input.value = entry[lang] || '';
    input.placeholder = varName;
    chipEl.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      entry[lang] = input.value;
      renderVarList();
      renderPreview();
      scheduleSave();
    }
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      else if (e.key === 'Escape') { renderPreview(); }
    });
    input.addEventListener('blur', commit);
  }

  function switchBodyToTextarea(bodyEl, mod, lang, modIndex) {
    var textarea = document.createElement('textarea');
    textarea.className = 'preview-inline-textarea';
    textarea.value = mod.content[lang] || '';
    bodyEl.replaceWith(textarea);
    textarea.focus();

    function commit() {
      mod.content[lang] = textarea.value;
      syncValuesWithVars();
      renderModuleList();
      renderVarList();
      renderPreview();
      scheduleSave();
    }
    textarea.addEventListener('blur', commit);
  }

  function renderPreviewStats() {
    var lang = state.lang;
    var enabledCount = state.modules.filter(function (m) { return m.enabled; }).length;
    var names = collectAllVarNames();
    var unfilled = names.filter(function (n) {
      var entry = state.values[n];
      return !entry || !entry[lang];
    }).length;

    $previewStats.innerHTML = '';
    var langLabel = lang === 'zh' ? '中文' : 'English';
    var text1 = document.createTextNode('模块 ' + enabledCount + ' · ' + langLabel + '未填 ');
    $previewStats.appendChild(text1);
    var span = document.createElement('span');
    span.textContent = String(unfilled);
    if (unfilled > 0) span.className = 'stat-bad';
    $previewStats.appendChild(span);
  }

  /* ============================================================
   * 11. 语言切换
   * ============================================================ */
  function setLang(lang) {
    if (state.lang === lang) return;
    state.lang = lang;
    renderAll();
    scheduleSave();
  }

  function renderLangSegmented() {
    var buttons = $langSegmented.querySelectorAll('button');
    buttons.forEach(function (btn) {
      btn.setAttribute('aria-pressed', btn.dataset.lang === state.lang ? 'true' : 'false');
    });
  }

  $langSegmented.addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-lang]');
    if (!btn) return;
    setLang(btn.dataset.lang);
  });

  [$cardZh, $cardEn].forEach(function (card) {
    card.addEventListener('click', function () {
      setLang(card.dataset.lang);
    });
  });

  /* ============================================================
   * 12. 顶部动作：复制 / 下载 / 清空 / 示例
   * ============================================================ */
  $btnCopy.addEventListener('click', function () {
    var text = compilePrompt(state.lang);
    var langName = state.lang === 'zh' ? '中文' : 'English';
    if (clipboardApi && clipboardApi.writeText) {
      clipboardApi.writeText(text)
        .then(function () { showToast('已复制' + langName + '提示词'); })
        .catch(function () { fallbackCopy(text, langName); });
    } else {
      fallbackCopy(text, langName);
    }
  });

  function fallbackCopy(text, langName) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(function () { showToast('已复制' + langName + '提示词'); })
        .catch(function () { showToast('复制失败'); });
    } else {
      showToast('复制失败：当前环境不支持');
    }
  }

  $btnDownload.addEventListener('click', function () {
    var text = compilePrompt(state.lang);
    var defaultName = state.lang === 'zh' ? 'prompt-zh.md' : 'prompt-en.md';
    var langName = state.lang === 'zh' ? '中文' : 'English';

    if (dialogApi && dialogApi.save && fsApi && fsApi.writeTextFile) {
      dialogApi.save({ defaultPath: defaultName, filters: [{ name: 'Markdown', extensions: ['md'] }] })
        .then(function (filePath) {
          if (!filePath) return;
          return fsApi.writeTextFile(filePath, text).then(function () {
            showToast('已下载' + langName + '提示词');
          });
        })
        .catch(function (err) {
          console.warn('下载失败:', err);
          showToast('下载失败');
        });
    } else {
      // 浏览器降级：触发本地下载
      var blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = defaultName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('已下载' + langName + '提示词');
    }
  });

  $btnClearAll.addEventListener('click', function () {
    state.modules = [];
    state.values = {};
    renderAll();
    scheduleSave();
  });

  $btnLoadDemo.addEventListener('click', function () {
    state.modules = buildDemoModules();
    state.values = buildDemoValues();
    renderAll();
    scheduleSave();
  });

  /* ============================================================
   * 13. 汇总渲染
   * ============================================================ */
  function renderAll() {
    syncValuesWithVars();
    renderModuleLib();
    renderLangSegmented();
    renderModuleList();
    renderVarList();
    renderPreview();
  }

  /* ============================================================
   * 14. 启动
   * ============================================================ */
  restoreState();
})();
</script>
</body>
</html>
