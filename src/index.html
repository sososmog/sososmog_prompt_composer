<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Composer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
   * 主题：暖色工程终端 —— 烟墨底 · 琥珀赤陶 accent
   * 布局：左侧辅助栏 + 右侧大写作编辑器（文本为唯一真相源）
   * ============================================================ */
  :root {
    --bg-deep:#ffffff;
    --bg-rail:#fbfbfa;
    --bg-editor:#ffffff;
    --surface:#f7f6f3;
    --surface-hi:#efeeec;
    --surface-inset:#f7f7f5;

    --line:#e9e9e7;
    --line-soft:#efefee;
    --line-hi:#dcdbd8;

    --text:#37352f;
    --text-soft:#5c594f;
    --muted:#918d84;
    --faint:#b0aca3;

    --amber:#2383e2;
    --amber-hi:#0b6fca;
    --amber-deep:#a7cbf0;
    --amber-glow:rgba(35,131,226,0.14);
    --amber-soft:rgba(35,131,226,0.08);

    --warn:#e03e3e;
    --warn-soft:rgba(224,62,62,0.10);
    --ok:#0f7b6c;
    --ok-soft:rgba(15,123,108,0.10);

    --radius:10px;
    --radius-sm:7px;
    --font-display:'Fraunces', Georgia, 'Songti SC', serif;
    --font-mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-sans:'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;

    --shadow-card:0 1px 2px rgba(15,15,15,0.05), 0 2px 8px rgba(15,15,15,0.06);
    --shadow-toast:0 6px 20px rgba(15,15,15,0.14), 0 1px 3px rgba(15,15,15,0.08);

    --bg-glow:rgba(35,131,226,0.04);
    --brand-mark-a:#2f8ee8;
    --brand-mark-b:#2383e2;
    --brand-mark-fg:#ffffff;
    --brand-mark-shadow:0 2px 6px rgba(35,131,226,0.28), inset 0 1px 0 rgba(255,255,255,0.25);
    --seg-active-bg:#ffffff;
    --seg-active-fg:var(--text);
    --seg-active-shadow:0 1px 2px rgba(15,15,15,0.08), 0 1px 3px rgba(15,15,15,0.06);
    --block-hover:rgba(55,53,47,0.03);
    --block-focus:rgba(55,53,47,0.02);
  }

  /* 深色主题（Notion 深色：冷调深灰黑） */
  [data-theme="dark"] {
    --bg-deep:#191919;
    --bg-rail:#202020;
    --bg-editor:#191919;
    --surface:#252525;
    --surface-hi:#2f2f2f;
    --surface-inset:#1e1e1e;

    --line:#373737;
    --line-soft:#2c2c2c;
    --line-hi:#474747;

    --text:#e6e6e5;
    --text-soft:#b3b3b1;
    --muted:#8a8987;
    --faint:#6a6a68;

    --amber:#5e9fe6;
    --amber-hi:#7db4ee;
    --amber-deep:#3d84cc;
    --amber-glow:rgba(94,159,230,0.18);
    --amber-soft:rgba(94,159,230,0.12);

    --warn:#eb5757;
    --warn-soft:rgba(235,87,87,0.16);
    --ok:#4dab9a;
    --ok-soft:rgba(77,171,154,0.16);

    --shadow-card:0 1px 0 rgba(255,255,255,0.02), 0 4px 16px rgba(0,0,0,0.36);
    --shadow-toast:0 8px 30px rgba(0,0,0,0.55);

    --bg-glow:rgba(94,159,230,0.05);
    --brand-mark-a:#5e9fe6;
    --brand-mark-b:#3d84cc;
    --brand-mark-fg:#ffffff;
    --brand-mark-shadow:0 2px 8px rgba(94,159,230,0.32), inset 0 1px 0 rgba(255,255,255,0.18);
    --seg-active-bg:#3a3a3a;
    --seg-active-fg:var(--text);
    --seg-active-shadow:0 1px 2px rgba(0,0,0,0.4);
    --block-hover:rgba(255,255,255,0.03);
    --block-focus:rgba(255,255,255,0.045);
  }

  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }

  body {
    font-family:var(--font-sans);
    font-size:14px;
    font-weight:450;
    color:var(--text);
    background:var(--bg-deep);
    background-image:
      radial-gradient(1100px 500px at 82% -8%, var(--bg-glow), transparent 60%);
    height:100vh;
    overflow:hidden;
    display:grid;
    grid-template-columns:296px 1fr;
    -webkit-font-smoothing:antialiased;
  }

  ::selection { background:var(--amber-glow); color:var(--amber-hi); }
  button, input, textarea { font-family:inherit; font-size:inherit; color:inherit; }
  :focus-visible { outline:2px solid var(--amber); outline-offset:2px; border-radius:5px; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  /* ============================================================
   * 左栏：辅助栏
   * ============================================================ */
  .rail {
    background:var(--bg-rail);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-width:0;
    overflow:hidden;
    position:relative;
  }
  .rail::before {
    content:'';
    position:absolute; top:0; left:0; bottom:0; width:2px;
    background:linear-gradient(180deg, var(--amber), transparent 70%);
    opacity:0.5;
  }

  .rail-head { padding:20px 18px 14px; border-bottom:1px solid var(--line-soft); }
  .brand { display:flex; align-items:center; gap:10px; }
  .rail-head-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .theme-toggle {
    flex:none; width:34px; height:34px; border-radius:var(--radius-sm);
    border:1px solid var(--line); background:var(--surface); color:var(--text-soft);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
  }
  .theme-toggle:hover { background:var(--surface-hi); border-color:var(--line-hi); color:var(--text); }
  .theme-toggle svg { width:17px; height:17px; }
  .theme-toggle .icon-sun { display:none; }
  .theme-toggle .icon-moon { display:block; }
  [data-theme="dark"] .theme-toggle .icon-sun { display:block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display:none; }
  .brand-mark {
    width:30px; height:30px; border-radius:8px;
    background:linear-gradient(150deg, var(--brand-mark-a), var(--brand-mark-b));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--brand-mark-fg);
    flex:none;
    box-shadow:var(--brand-mark-shadow);
  }
  .brand-text { display:flex; flex-direction:column; line-height:1.1; }
  .brand-name { font-family:var(--font-display); font-weight:600; font-size:21px; color:var(--text); letter-spacing:-0.01em; }
  .brand-tagline { font-size:10.5px; letter-spacing:0.14em; color:var(--faint); text-transform:uppercase; margin-top:1px; }

  .rail-scroll { flex:1; overflow-y:auto; padding:16px 18px 18px; min-height:0; }

  .rail-section { margin-bottom:22px; }
  .rail-section-title {
    margin-bottom:10px;
    font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .rail-section-title::after { content:''; flex:1; height:1px; background:var(--line); }
  .rail-section-title .rst-count { font-family:var(--font-mono); font-size:10px; color:var(--faint); letter-spacing:0; text-transform:none; }
  .rail-section-title .rst-bad { color:var(--warn); }

  /* 插入模块：小药丸网格 */
  .insert-grid { display:flex; flex-wrap:wrap; gap:6px; }
  .insert-pill {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 10px; border-radius:999px;
    background:var(--surface); border:1px solid var(--line);
    color:var(--text-soft); cursor:pointer; font-size:12px;
    transition:background 0.14s ease, border-color 0.14s ease, color 0.14s ease, transform 0.07s ease;
  }
  .insert-pill:hover { background:var(--surface-hi); border-color:var(--amber-deep); color:var(--text); }
  .insert-pill:active { transform:translateY(1px); }
  .insert-pill .ip-plus { color:var(--amber); font-family:var(--font-mono); font-weight:600; }

  /* 变量列表 */
  .var-list { display:flex; flex-direction:column; gap:7px; }
  .var-row { display:flex; align-items:center; gap:7px; }
  .var-name-chip {
    font-family:var(--font-mono); font-size:11px;
    background:var(--amber-soft); color:var(--amber); border:1px solid var(--amber-deep);
    border-radius:6px; padding:6px 8px; flex:none;
    max-width:96px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .var-name-chip.empty { background:var(--warn-soft); color:var(--warn); border-color:var(--warn); }
  .var-value-input {
    flex:1; min-width:0;
    border:1px solid var(--line-hi); background:var(--surface-inset);
    border-radius:6px; padding:6px 9px; font-size:12px; color:var(--text);
    transition:border-color 0.12s ease;
  }
  .var-value-input::placeholder { color:var(--faint); }
  .var-value-input:focus { border-color:var(--amber); }
  .var-empty-hint { font-size:12px; color:var(--faint); line-height:1.6; }
  .var-empty-hint code { font-family:var(--font-mono); color:var(--amber); background:var(--amber-soft); padding:0 4px; border-radius:4px; }

  /* 常用句 */
  .snippet-wrap { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .snippet-pill {
    display:inline-flex; align-items:center; gap:5px;
    background:var(--surface-inset); border:1px solid var(--line);
    border-radius:999px; padding:4px 10px; font-size:11.5px; color:var(--text-soft);
    cursor:pointer; transition:background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }
  .snippet-pill:hover { background:var(--amber-soft); border-color:var(--amber-deep); color:var(--amber); }
  .snippet-pill .remove-x { color:var(--faint); font-size:13px; line-height:1; }
  .snippet-pill .remove-x:hover { color:var(--warn); }
  .snippet-add {
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; border-radius:999px;
    border:1.5px dashed var(--line-hi); background:transparent; color:var(--muted);
    cursor:pointer; font-size:13px; transition:border-color 0.12s ease, color 0.12s ease;
  }
  .snippet-add:hover { border-color:var(--amber); color:var(--amber); }
  .snippet-add-input {
    border:1px solid var(--amber); background:var(--surface-inset);
    border-radius:999px; padding:5px 11px; font-size:11.5px; min-width:150px; color:var(--text);
  }

  .btn-ghost-rail {
    display:inline-flex; align-items:center; gap:6px;
    background:transparent; border:1px solid var(--line); color:var(--text-soft);
    border-radius:var(--radius-sm); padding:0 14px; height:40px; cursor:pointer; font-size:12.5px; white-space:nowrap; flex:none;
    transition:border-color 0.14s ease, color 0.14s ease, background 0.14s ease;
  }
  .btn-ghost-rail:hover { border-color:var(--amber-deep); color:var(--text); background:var(--surface); }
  .btn-ghost-rail.danger:hover { border-color:var(--warn); color:var(--warn); }
  .btn-ghost-rail .bg-ico { width:15px; text-align:center; opacity:0.7; }

  .rail-foot { padding:12px 18px 16px; border-top:1px solid var(--line-soft); flex:none; }
  .btn-load-tpl {
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    background:var(--surface); border:1px solid var(--amber-deep); color:var(--amber-hi);
    border-radius:var(--radius-sm); padding:0 14px; height:42px; cursor:pointer;
    font-size:13px; font-weight:600; white-space:nowrap;
    transition:border-color 0.14s ease, color 0.14s ease, background 0.14s ease, transform 0.08s ease;
  }
  .btn-load-tpl:hover { background:var(--surface-hi); border-color:var(--amber-hi); }
  .btn-load-tpl:active { transform:translateY(1px); }
  .btn-load-tpl .bg-ico { text-align:center; opacity:0.85; }

  /* ============================================================
   * 右栏：主写作编辑器
   * ============================================================ */
  .editor {
    display:flex; flex-direction:column;
    min-width:0; overflow:hidden;
    background:var(--bg-editor);
  }

  .editor-head {
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:18px 28px 14px;
    flex:none;
  }
  .editor-title-wrap { display:flex; align-items:baseline; gap:12px; min-width:0; }
  .editor-title { font-family:var(--font-display); font-weight:600; font-size:22px; color:var(--text); letter-spacing:-0.01em; }
  .editor-sub { font-size:12px; color:var(--muted); font-family:var(--font-mono); }

  .segmented { display:inline-flex; background:var(--surface-inset); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; flex:none; }
  .segmented button {
    border:none; background:transparent; padding:6px 18px; border-radius:999px; cursor:pointer;
    color:var(--muted); font-size:13px; font-weight:500;
    transition:background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
  }
  .segmented button[aria-pressed="true"] {
    background:var(--seg-active-bg);
    color:var(--seg-active-fg); font-weight:600; box-shadow:var(--seg-active-shadow);
  }

  /* 编辑区主体：占满剩余高度 */
  .editor-main { flex:1; display:flex; flex-direction:column; min-height:0; padding:0 28px 20px; }

  .editor-surface {
    flex:1; display:flex; flex-direction:column; min-height:0;
    border:1px solid var(--line); border-radius:var(--radius);
    background:var(--surface-inset);
    box-shadow:var(--shadow-card);
    overflow:hidden;
    transition:border-color 0.15s ease;
  }
  .editor-surface:focus-within { border-color:var(--amber-deep); }

  .editor-toolbar {
    display:flex; align-items:center; gap:10px;
    padding:9px 14px; border-bottom:1px solid var(--line-soft);
    flex:none;
    background:var(--surface);
  }
  .editor-toolbar .et-label { font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--faint); }
  .editor-toolbar .et-spacer { flex:1; }
  .editor-toolbar .et-stat { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .editor-toolbar .et-stat b { color:var(--text-soft); font-weight:600; }
  .editor-toolbar .et-stat .et-bad { color:var(--warn); }
  .seg-mini { display:inline-flex; background:var(--surface-inset); border:1px solid var(--line); border-radius:7px; padding:2px; gap:2px; }
  .seg-mini button {
    border:none; background:transparent; padding:3px 11px; border-radius:5px; cursor:pointer;
    color:var(--muted); font-size:11.5px; font-weight:500; transition:background 0.14s, color 0.14s;
  }
  .seg-mini button[aria-pressed="true"] { background:var(--surface-hi); color:var(--amber); }

  /* 预览层（替换变量后，只读渲染）— 与编辑框互斥显示 */
  .editor-preview {
    flex:1; width:100%; min-height:0; overflow-y:auto;
    padding:22px 26px;
    font-family:var(--font-mono); font-size:14px; line-height:1.85; color:var(--text-soft);
    white-space:pre-wrap; word-break:break-word;
  }
  .editor-preview .pv-h { color:var(--amber); font-weight:600; }
  .editor-preview .pv-var {
    display:inline-block; background:var(--amber-soft); color:var(--amber);
    border:1px solid var(--amber-deep); border-radius:5px; padding:0 5px; cursor:pointer;
    transition:background 0.1s ease;
  }
  .editor-preview .pv-var:hover { background:var(--amber-glow); }
  .editor-preview .pv-var.unfilled { background:var(--warn-soft); color:var(--warn); border-color:var(--warn); }
  .editor-preview-empty { color:var(--faint); }

  /* ---------- 块化编辑器（Notion 式，每个 ## 段落一张卡片） ---------- */
  .blocks {
    flex:1; width:100%; min-height:0; overflow-y:auto;
    padding:16px 18px 40px;
    display:flex; flex-direction:column; gap:8px;
  }
  .block {
    display:flex; align-items:stretch; gap:2px;
    border:1px solid transparent; border-radius:var(--radius-sm);
    transition:border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease, opacity 0.15s ease;
  }
  .block:hover { background:var(--block-hover); }
  .block:focus-within { border-color:var(--line-hi); background:var(--block-focus); }
  /* FLIP：让位块从旧位置平滑滑到新位置（transform 由 JS 设置，这里给过渡曲线） */
  .block.flip { transition:transform 0.22s cubic-bezier(0.2, 0, 0, 1), border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease; }
  /* 被拖块：跟随指针，浮起，脱离命中检测 */
  .block.dragging {
    position:relative; z-index:20;
    opacity:0.97; pointer-events:none;
    box-shadow:0 12px 34px rgba(0,0,0,0.5), 0 0 0 1px var(--amber-deep);
    background:var(--surface); border-color:var(--amber-deep);
    cursor:grabbing;
  }
  /* 被拖块原位留下的“凹槽”占位（虚线轮廓） */
  .block.drag-placeholder {
    border:1px dashed var(--line-hi); background:var(--surface-inset);
    border-radius:var(--radius-sm);
  }

  .block-gutter {
    flex:none; width:26px;
    display:flex; flex-direction:column; align-items:center; padding-top:9px; gap:2px;
    opacity:0; transition:opacity 0.12s ease;
  }
  .block:hover .block-gutter, .block:focus-within .block-gutter { opacity:1; }
  .block-handle {
    width:22px; height:22px; border-radius:5px;
    display:flex; align-items:center; justify-content:center;
    color:var(--faint); cursor:grab; user-select:none; font-size:15px;
    touch-action:none; transition:color 0.12s ease, background 0.12s ease;
  }
  .block-handle:hover { color:var(--amber); background:var(--amber-soft); }
  .block-handle:active { cursor:grabbing; }
  .block-del {
    width:22px; height:22px; border:none; background:transparent; cursor:pointer;
    color:var(--faint); border-radius:5px; display:flex; align-items:center; justify-content:center;
    transition:color 0.12s ease, background 0.12s ease;
  }
  .block-del svg { width:12px; height:12px; }
  .block-del:hover { color:var(--warn); background:var(--warn-soft); }

  .block-body { flex:1; min-width:0; padding:4px 6px 4px 0; }
  .block-textarea {
    width:100%; resize:none; overflow:hidden;
    border:none; outline:none; background:transparent;
    padding:6px 8px;
    font-family:var(--font-mono); font-size:14px; line-height:1.8; color:var(--text);
    tab-size:2; display:block;
  }
  .block-textarea::placeholder { color:var(--faint); }

  .blocks-empty {
    color:var(--faint); padding:26px 8px; font-size:13px; line-height:1.7;
  }
  .blocks-empty code { font-family:var(--font-mono); color:var(--amber); background:var(--amber-soft); padding:0 4px; border-radius:4px; }

  .block-add {
    display:flex; align-items:center; gap:8px; margin:4px 0 0 26px;
    padding:8px 10px; border:1px dashed var(--line-hi); border-radius:var(--radius-sm);
    background:transparent; color:var(--muted); cursor:pointer; font-size:12.5px;
    transition:border-color 0.14s ease, color 0.14s ease, background 0.14s ease;
  }
  .block-add:hover { border-color:var(--amber-deep); color:var(--amber); background:var(--amber-soft); }

  /* 底部：只有输出动作 */
  .editor-foot { display:flex; align-items:center; gap:12px; padding:16px 28px 20px; flex:none; }
  .foot-hint { font-size:11.5px; color:var(--faint); margin-right:auto; }
  .foot-hint kbd {
    font-family:var(--font-mono); font-size:10.5px;
    background:var(--surface-hi); border:1px solid var(--line-hi); border-bottom-width:2px;
    border-radius:5px; padding:1px 6px; color:var(--text-soft);
  }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    border-radius:var(--radius-sm); padding:11px 20px; font-size:13px; font-weight:600;
    cursor:pointer; border:1px solid transparent;
    transition:background 0.14s ease, border-color 0.14s ease, color 0.14s ease, transform 0.08s ease;
    flex:none;
  }
  .btn svg { width:15px; height:15px; }
  .btn:active { transform:translateY(1px); }
  .btn-primary { background:linear-gradient(160deg, var(--amber-hi), var(--amber-deep)); color:#241a10; box-shadow:0 2px 10px rgba(224,150,74,0.28); }
  .btn-primary:hover { background:linear-gradient(160deg, var(--amber-hi), var(--amber)); }
  .btn-outline { background:var(--surface); border-color:var(--line-hi); color:var(--text-soft); }
  .btn-outline:hover { border-color:var(--amber-deep); color:var(--text); }

  /* Toast */
  .toast {
    position:fixed; bottom:26px; left:calc(296px + (100vw - 296px) / 2);
    transform:translateX(-50%) translateY(10px);
    background:var(--surface-hi); border:1px solid var(--line-hi); color:var(--text);
    padding:11px 20px; border-radius:999px; font-size:13px;

<script>
(function () {
  'use strict';

  /* ============================================================
   * 0. Tauri API 安全获取（浏览器中预览时降级）
   * ============================================================ */
  var TAURI = window.__TAURI__ || null;
  var fsApi = TAURI && TAURI.fs;
  var dialogApi = TAURI && TAURI.dialog;
  var clipboardApi = TAURI && TAURI.clipboardManager;

  var BaseDirectory = fsApi && fsApi.BaseDirectory;
  var STATE_FILE = 'composer-state.json';
  function tauriAvailable() { return !!(TAURI && fsApi && BaseDirectory); }

  /* ============================================================
   * 1. 预设：可插入的模块片段 / 常用句 / 示例正文
   * ============================================================ */
  var INSERT_MODULES = [
    { label: { zh: '角色', en: 'Role' },
      text: { zh: '## 角色\n你是{{角色}}，擅长{{领域}}。', en: '## Role\nYou are {{角色}}, skilled in {{领域}}.' } },
    { label: { zh: '场景', en: 'Scenario' },
      text: { zh: '## 场景\n使用场景：{{场景}}。目标用户是{{用户}}。', en: '## Scenario\nScenario: {{场景}}. Target users are {{用户}}.' } },
    { label: { zh: '问题', en: 'Problem' },
      text: { zh: '## 问题\n当前遇到的问题：{{问题}}。', en: '## Problem\nThe current problem: {{问题}}.' } },
    { label: { zh: '需求效果', en: 'Outcome' },
      text: { zh: '## 需求效果\n期望达成的效果：{{需求效果}}。', en: '## Desired outcome\nDesired outcome: {{需求效果}}.' } },
    { label: { zh: '解决方案', en: 'Solution' },
      text: { zh: '## 解决方案\n建议的解决方案：{{解决方案}}。', en: '## Solution\nProposed solution: {{解决方案}}.' } },
    { label: { zh: '规则', en: 'Rules' },
      text: { zh: '## 规则\n- 始终{{必须做}}\n- 绝不{{禁止做}}', en: '## Rules\n- Always {{必须做}}\n- Never {{禁止做}}' } },
    { label: { zh: '工作流程', en: 'Workflow' },
      text: { zh: '## 工作流程\n1. {{步骤一}}\n2. {{步骤二}}\n3. {{步骤三}}', en: '## Workflow\n1. {{步骤一}}\n2. {{步骤二}}\n3. {{步骤三}}' } },
    { label: { zh: '输出格式', en: 'Format' },
      text: { zh: '## 输出格式\n以{{格式}}形式输出。', en: '## Output format\nOutput in {{格式}}.' } },
    { label: { zh: '示例', en: 'Examples' },
      text: { zh: '## 示例\n输入：{{示例输入}}\n输出：{{示例输出}}', en: '## Examples\nInput: {{示例输入}}\nOutput: {{示例输出}}' } },
    { label: { zh: '约束', en: 'Constraints' },
      text: { zh: '## 约束\n不要{{约束}}。', en: '## Constraints\nDo not {{约束}}.' } }
  ];

  var BUILTIN_SNIPPETS = [
    { tag: '分步思考', zh: '请先一步步思考，再给出最终答案。', en: 'Think step by step, then give the final answer.', builtin: true },
    { tag: '先给结论', zh: '请先给出结论，再展开说明理由。', en: 'State the conclusion first, then explain the reasoning.', builtin: true },
    { tag: '保持简洁', zh: '回答请保持简洁，避免冗余表述。', en: 'Keep the answer concise and avoid redundancy.', builtin: true },
    { tag: '语气专业', zh: '请使用专业、客观的语气。', en: 'Use a professional and objective tone.', builtin: true },
    { tag: '举例说明', zh: '请结合具体例子进行说明。', en: 'Illustrate with concrete examples.', builtin: true },
    { tag: '分点列出', zh: '请使用分点列表清晰呈现。', en: 'Present the answer as a clear bulleted list.', builtin: true },
    { tag: '面向新手', zh: '面向零基础用户解释。', en: 'Explain for a complete beginner.', builtin: true },
    { tag: '不要编造', zh: '不确定时如实说明，不要编造。', en: 'If uncertain, say so — do not make things up.', builtin: true },
    { tag: 'Markdown', zh: '请使用 Markdown 格式输出。', en: 'Format the output using Markdown.', builtin: true },
    { tag: '限制字数', zh: '请将回答控制在 200 字以内。', en: 'Limit the response to about 200 words.', builtin: true }
  ];

  function demoContent() {
    return {
      zh: '## 角色\n你是{{角色}}，擅长{{领域}}。你服务的对象是{{用户}}。\n\n## 场景\n使用场景：{{场景}}。\n\n## 需求效果\n期望达成的效果：{{需求效果}}。\n\n## 解决方案\n请围绕以下方向给出方案：{{解决方案}}。\n\n## 输出格式\n以{{格式}}输出，并附上{{附加要求}}。',
      en: '## Role\nYou are {{角色}}, skilled in {{领域}}. You serve {{用户}}.\n\n## Scenario\nScenario: {{场景}}.\n\n## Desired outcome\nDesired outcome: {{需求效果}}.\n\n## Solution\nPropose a solution along these lines: {{解决方案}}.\n\n## Output format\nOutput in {{格式}}, and include {{附加要求}}.'
    };
  }

  function demoValues() {
    return {
      '角色': { zh: '一名资深全栈工程师', en: 'a senior full-stack engineer' },
      '领域': { zh: 'Web 产品开发与代码审查', en: 'web product development and code review' },
      '用户': { zh: '产品团队的开发者', en: 'developers on the product team' },
      '场景': { zh: '在现有 SaaS 产品中新增一个功能模块', en: 'adding a new feature module to an existing SaaS product' },
      '需求效果': { zh: '', en: '' },
      '解决方案': { zh: '技术选型、接口设计、关键实现步骤', en: 'tech stack choice, API design, key implementation steps' },
      '格式': { zh: 'Markdown', en: 'Markdown' },
      '附加要求': { zh: '示例代码', en: 'sample code' }
    };
  }

  function defaultState() {
    return { lang: 'zh', content: demoContent(), values: demoValues(), customSnippets: [] };
  }

  /* ============================================================
   * 2. 状态 + 持久化
   * ============================================================ */
  var state = defaultState();
  var view = 'write'; // 'write' | 'preview'
  var saveTimer = null;

  function scheduleSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(persistState, 300);
  }

  var appDataEnsured = false;
  function ensureAppDataDir() {
    if (appDataEnsured || !fsApi.mkdir) return Promise.resolve();
    return fsApi.mkdir('.', { baseDir: BaseDirectory.AppData, recursive: true })
      .then(function () { appDataEnsured = true; })
      .catch(function () { appDataEnsured = true; });
  }

  function persistState() {
    if (!tauriAvailable()) return;
    var payload = JSON.stringify(state, null, 2);
    ensureAppDataDir().then(function () {
      return fsApi.writeTextFile(STATE_FILE, payload, { baseDir: BaseDirectory.AppData });
    }).catch(function (err) { console.warn('持久化失败:', err); });
  }

  function restoreState() {
    if (!tauriAvailable()) { renderAll(); return; }
    fsApi.exists(STATE_FILE, { baseDir: BaseDirectory.AppData })
      .then(function (exists) {
        if (!exists) throw new Error('no-state-file');
        return fsApi.readTextFile(STATE_FILE, { baseDir: BaseDirectory.AppData });
      })
      .then(function (text) {
        var parsed = JSON.parse(text);
        if (parsed && typeof parsed === 'object') state = normalizeState(parsed);
      })
      .catch(function () { state = defaultState(); })
      .then(function () { renderAll(); });
  }

  // 兼容旧存档：旧版是 modules 数组，编译成一份大文本。
  function modulesToText(modules, lang) {
    if (!Array.isArray(modules)) return '';
    return modules
      .filter(function (m) { return m && m.enabled !== false; })
      .map(function (m) {
        var label = (m.label && (m.label[lang] || m.label.zh || m.label.en)) || '';
        var body = (m.content && (m.content[lang] || '')) || '';
        return '## ' + label + '\n' + body;
      })
      .join('\n\n');
  }

  function normalizeState(raw) {
    var s = defaultState();
    s.lang = (raw.lang === 'en') ? 'en' : 'zh';

    if (raw.content && typeof raw.content === 'object' &&
        (typeof raw.content.zh === 'string' || typeof raw.content.en === 'string')) {
      // 新格式
      s.content = { zh: raw.content.zh || '', en: raw.content.en || '' };
    } else if (Array.isArray(raw.modules)) {
      // 旧格式迁移
      s.content = { zh: modulesToText(raw.modules, 'zh'), en: modulesToText(raw.modules, 'en') };
    }

    if (raw.values && typeof raw.values === 'object') {
      s.values = {};
      Object.keys(raw.values).forEach(function (k) {
        var v = raw.values[k] || {};
        s.values[k] = { zh: v.zh || '', en: v.en || '' };
      });
    }
    if (Array.isArray(raw.customSnippets)) {
      s.customSnippets = raw.customSnippets.filter(function (sn) { return sn && typeof sn.tag === 'string'; });
    }
    return s;
  }

  /* ============================================================
   * 3. 变量 / 编译 / token
   * ============================================================ */
  var VAR_RE = /\{\{\s*([^{}]+?)\s*\}\}/g;

  function extractVarNames(text) {
    var names = [], seen = {}, m;
    VAR_RE.lastIndex = 0;
    while ((m = VAR_RE.exec(text || '')) !== null) {
      if (!seen[m[1]]) { seen[m[1]] = true; names.push(m[1]); }
    }
    return names;
  }

  // 只收集“当前语言正文”里出现的变量（编辑器所见即所得）
  function currentVarNames() { return extractVarNames(state.content[state.lang]); }

  function ensureValueEntry(name) {
    if (!state.values[name]) state.values[name] = { zh: '', en: '' };
    return state.values[name];
  }
  function syncValues() { currentVarNames().forEach(ensureValueEntry); }

  function compile(lang) {
    var text = state.content[lang] || '';
    return text.replace(VAR_RE, function (full, name) {
      var entry = state.values[name];
      var val = entry ? entry[lang] : '';
      return val ? val : full;
    });
  }

  function estimateTokens(text) {
    if (!text) return 0;
    var cjk = 0, other = 0;
    for (var i = 0; i < text.length; i++) {
      var code = text.codePointAt(i);
      var isCjk = (code >= 0x3000 && code <= 0x303f) || (code >= 0x3400 && code <= 0x9fff) || (code >= 0xff00 && code <= 0xffef);
      if (isCjk) cjk++; else other++;
    }
    return Math.round(cjk * 1.6 + other / 4);
  }

  /* ============================================================
   * 4. DOM
   * ============================================================ */
  var $insertGrid = document.getElementById('insertGrid');
  var $varList = document.getElementById('varList');
  var $varCount = document.getElementById('varCount');
  var $snippetWrap = document.getElementById('snippetWrap');
  var $langSegmented = document.getElementById('langSegmented');
  var $viewSeg = document.getElementById('viewSeg');
  var $etLabel = document.getElementById('etLabel');
  var $editorSub = document.getElementById('editorSub');
  var $editorStat = document.getElementById('editorStat');
  var $blocks = document.getElementById('blocks');
  var $preview = document.getElementById('editorPreview');
  var $btnCopy = document.getElementById('btnCopy');
  var $btnDownload = document.getElementById('btnDownload');
  var $btnLoadDemo = document.getElementById('btnLoadDemo');
  var $btnClearAll = document.getElementById('btnClearAll');
  var $toast = document.getElementById('toast');

  /* ============================================================
   * 5. Toast
   * ============================================================ */
  var toastTimer = null;
  function showToast(msg, isErr) {
    $toast.textContent = msg;
    $toast.classList.toggle('err', !!isErr);
    $toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { $toast.classList.remove('show'); }, 1800);
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  /* ============================================================
   * 6. 块模型：正文 ⇄ 块 的解析与回写
   * ------------------------------------------------------------
   * 真相源仍是 state.content[lang] 大文本。块只是视图：
   *   parseBlocks(text) 把文本按 "## " 开头切成块（首个 ## 之前的
   *   内容作为一个无标题“前言块”）；编辑/拖拽后由 collectText() 从
   *   DOM 顺序收集各块文本并以空行拼回，写入 state。
   * ============================================================ */
  function parseBlocks(text) {
    text = text || '';
    if (!text.trim()) return [];
    var lines = text.split('\n');
    var blocks = [];
    var cur = null;
    lines.forEach(function (line) {
      if (/^##\s/.test(line) || /^##$/.test(line)) {
        if (cur !== null) blocks.push(cur);
        cur = line;
      } else {
        if (cur === null) cur = line;            // 前言块
        else cur += '\n' + line;
      }
    });
    if (cur !== null) blocks.push(cur);
    // 去掉纯空白块（多为块间的空行）
    return blocks.filter(function (b) { return b.trim() !== ''; });
  }

  // 从 DOM 中所有块 textarea 收集文本，拼成正文并写回 state。
  function collectText() {
    var areas = $blocks.querySelectorAll('.block-textarea');
    var parts = [];
    areas.forEach(function (a) {
      var v = a.value.replace(/\s+$/, ''); // 去块尾多余空白，避免累积空行
      if (v !== '') parts.push(v);
    });
    var text = parts.join('\n\n');
    state.content[state.lang] = text;
    return text;
  }

  // 在当前聚焦块的光标处插入片段；无聚焦块则新建一个块（追加到末尾）。
  function insertSnippet(snippet) {
    var active = document.activeElement;
    var isBlockArea = active && active.classList && active.classList.contains('block-textarea');
    var isModuleTemplate = snippet.slice(0, 2) === '##';

    if (isBlockArea && !isModuleTemplate) {
      // 短句：插入到当前块光标处
      var el = active;
      var start = el.selectionStart, end = el.selectionEnd;
      var before = el.value.slice(0, start);
      var pre = (before.length > 0 && !before.endsWith('\n')) ? '\n' : '';
      var insertText = pre + snippet;
      el.value = before + insertText + el.value.slice(end);
      var caret = before.length + insertText.length;
      el.focus();
      el.setSelectionRange(caret, caret);
      autosize(el);
      onBlocksChanged();
    } else {
      // 模块模板，或未聚焦任何块：作为新块追加
      var text = collectText();
      var joined = text ? (text + '\n\n' + snippet) : snippet;
      state.content[state.lang] = joined;
      renderBlocks();
      syncValues();
      renderVarList();
      refreshStat();
      scheduleSave();
      // 聚焦新块末尾
      var areas = $blocks.querySelectorAll('.block-textarea');
      var last = areas[areas.length - 1];
      if (last) { last.focus(); last.setSelectionRange(last.value.length, last.value.length); }
    }
  }

  /* ============================================================
   * 7. 渲染：左栏
   * ============================================================ */
  function renderInsertGrid() {
    $insertGrid.innerHTML = '';
    INSERT_MODULES.forEach(function (mod) {
      var pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'insert-pill';
      pill.setAttribute('role', 'listitem');
      pill.title = '插入到光标处';
      pill.innerHTML = '<span class="ip-plus">+</span><span>' + escapeHtml(mod.label[state.lang]) + '</span>';
      pill.addEventListener('click', function () { insertSnippet(mod.text[state.lang]); });
      $insertGrid.appendChild(pill);
    });
  }

  function renderVarList() {
    var lang = state.lang;
    var names = currentVarNames();

    var filled = 0;
    names.forEach(function (n) { var e = state.values[n]; if (e && e[lang]) filled++; });
    if (names.length === 0) {
      $varCount.textContent = '';
    } else {
      var unfilled = names.length - filled;
      $varCount.innerHTML = unfilled > 0
        ? '<span class="rst-bad">' + filled + '/' + names.length + '</span>'
        : (filled + '/' + names.length);
    }

    $varList.innerHTML = '';
    if (names.length === 0) {
      var hint = document.createElement('div');
      hint.className = 'var-empty-hint';
      hint.innerHTML = '在正文中输入 <code>{{名称}}</code> 即可创建变量，填值在此按语言分别录入。';
      $varList.appendChild(hint);
      return;
    }
    names.forEach(function (name) {
      var entry = ensureValueEntry(name);
      var row = document.createElement('div');
      row.className = 'var-row';

      var chip = document.createElement('span');
      var isEmpty = !entry[lang];
      chip.className = 'var-name-chip' + (isEmpty ? ' empty' : '');
      chip.textContent = name;
      chip.title = name;
      row.appendChild(chip);

      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'var-value-input';
      input.value = entry[lang] || '';
      input.setAttribute('aria-label', '变量 ' + name + ' 的值');
      input.placeholder = '填写变量值…';
      input.addEventListener('input', function () {
        entry[lang] = input.value;
        chip.classList.toggle('empty', !input.value);
        if (view === 'preview') renderPreview();
        refreshVarCount();
        refreshStat();
        scheduleSave();
      });
      row.appendChild(input);
      $varList.appendChild(row);
    });
  }

  function refreshVarCount() {
    var lang = state.lang;
    var names = currentVarNames();
    if (names.length === 0) { $varCount.textContent = ''; return; }
    var filled = 0;
    names.forEach(function (n) { var e = state.values[n]; if (e && e[lang]) filled++; });
    var unfilled = names.length - filled;
    $varCount.innerHTML = unfilled > 0
      ? '<span class="rst-bad">' + filled + '/' + names.length + '</span>'
      : (filled + '/' + names.length);
  }

  function allSnippets() { return BUILTIN_SNIPPETS.concat(state.customSnippets); }

  function renderSnippets() {
    var lang = state.lang;
    $snippetWrap.innerHTML = '';
    allSnippets().forEach(function (snip) {
      var pill = document.createElement('span');
      pill.className = 'snippet-pill';
      pill.title = snip[lang] || snip.zh || snip.en;
      var t = document.createElement('span');
      t.textContent = snip.tag;
      pill.appendChild(t);
      pill.addEventListener('click', function (e) {
        if (e.target.classList.contains('remove-x')) return;
        insertSnippet(snip[lang] || snip.zh || snip.en);
      });
      if (!snip.builtin) {
        var x = document.createElement('span');
        x.className = 'remove-x';
        x.textContent = '×';
        x.setAttribute('role', 'button');
        x.setAttribute('aria-label', '删除自定义常用句 ' + snip.tag);
        x.addEventListener('click', function (e) {
          e.stopPropagation();
          var i = state.customSnippets.indexOf(snip);
          if (i >= 0) state.customSnippets.splice(i, 1);
          renderSnippets();
          scheduleSave();
        });
        pill.appendChild(x);
      }
      $snippetWrap.appendChild(pill);
    });

    var add = document.createElement('button');
    add.type = 'button';
    add.className = 'snippet-add';
    add.setAttribute('aria-label', '添加自定义常用句');
    add.title = '添加自定义常用句';
    add.textContent = '+';
    add.addEventListener('click', function () { openSnippetAdd(add); });
    $snippetWrap.appendChild(add);
  }

  function openSnippetAdd(addBtn) {
    if ($snippetWrap.querySelector('.snippet-add-input')) return;
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'snippet-add-input';
    input.placeholder = '输入常用句，回车保存';
    $snippetWrap.insertBefore(input, addBtn);
    input.focus();

    var committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      var text = input.value.trim();
      if (text) {
        var tag = text.length > 8 ? (text.slice(0, 8) + '…') : text;
        state.customSnippets.push({ tag: tag, zh: text, en: text, builtin: false });
        renderSnippets();
        scheduleSave();
      } else {
        input.remove();
      }
    }
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { input.remove(); }
    });
    input.addEventListener('blur', function () { setTimeout(commit, 0); });
  }

  /* ============================================================
   * 8. 渲染：右栏编辑器 / 预览 / 状态
   * ============================================================ */
  function renderEditor() {
    if (view !== 'preview') renderBlocks();
    $etLabel.textContent = state.lang === 'zh' ? '中文正文' : 'English 正文';
    refreshStat();
    if (view === 'preview') renderPreview();
  }

  /* ---------- 块化编辑器渲染 ---------- */
  function autosize(area) {
    area.style.height = 'auto';
    area.style.height = (area.scrollHeight) + 'px';
  }

  function renderBlocks() {
    var blocks = parseBlocks(state.content[state.lang] || '');
    $blocks.innerHTML = '';

    if (blocks.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'blocks-empty';
      empty.innerHTML = '还没有内容。点左侧「插入模块」快速开始，或直接在下方新建一个块。<br>用 <code>## 标题</code> 组织段落，<code>{{变量}}</code> 占位。';
      $blocks.appendChild(empty);
      appendAddBlockButton();
      return;
    }

    blocks.forEach(function (blockText, idx) {
      $blocks.appendChild(buildBlockCard(blockText, idx));
    });
    appendAddBlockButton();
  }

  function appendAddBlockButton() {
    var add = document.createElement('button');
    add.type = 'button';
    add.className = 'block-add';
    add.innerHTML = '<span style="font-family:var(--font-mono);color:var(--amber)">+</span> 新建块';
    add.addEventListener('click', function () {
      var text = collectText();
      state.content[state.lang] = text ? (text + '\n\n## ') : '## ';
      renderBlocks();
      refreshStat();
      scheduleSave();
      var areas = $blocks.querySelectorAll('.block-textarea');
      var last = areas[areas.length - 1];
      if (last) { last.focus(); last.setSelectionRange(last.value.length, last.value.length); }
    });
    $blocks.appendChild(add);
  }

  function buildBlockCard(blockText, idx) {
    var card = document.createElement('div');
    card.className = 'block';
    card.dataset.idx = idx;

    // gutter：拖拽手柄 + 删除
    var gutter = document.createElement('div');
    gutter.className = 'block-gutter';

    var handle = document.createElement('div');
    handle.className = 'block-handle';
    handle.setAttribute('role', 'button');
    handle.setAttribute('aria-label', '拖动排序');
    handle.title = '拖动排序（或 Alt+↑/↓）';
    handle.textContent = '⠿';
    attachDrag(handle, card);
    gutter.appendChild(handle);

    var del = document.createElement('button');
    del.type = 'button';
    del.className = 'block-del';
    del.setAttribute('aria-label', '删除此块');
    del.title = '删除此块';
    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    del.addEventListener('click', function () { deleteBlock(card); });
    gutter.appendChild(del);

    card.appendChild(gutter);

    // body：块内 textarea
    var body = document.createElement('div');
    body.className = 'block-body';
    var area = document.createElement('textarea');
    area.className = 'block-textarea';
    area.spellcheck = false;
    area.value = blockText;
    area.rows = 1;
    area.setAttribute('aria-label', '块内容');
    area.addEventListener('input', function () {
      autosize(area);
      onBlocksChanged();
    });
    area.addEventListener('keydown', function (e) {
      // Alt+↑/↓ 移动块
      if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
        e.preventDefault();
        moveBlock(card, e.key === 'ArrowUp' ? -1 : 1);
      }
    });
    body.appendChild(area);
    card.appendChild(body);

    // 初次布局后自适应高度
    requestAnimationFrame(function () { autosize(area); });

    return card;
  }

  // 块内容变化：收集回写 + 同步变量（不重建 DOM，避免打断输入）
  function onBlocksChanged() {
    collectText();
    syncValues();
    renderVarList();
    refreshStat();
    scheduleSave();
  }

  function deleteBlock(card) {
    var area = card.querySelector('.block-textarea');
    // 有内容时二次确认，空块直接删
    if (area && area.value.trim() && !window.confirm('删除这个块？')) return;
    card.remove();
    collectText();
    syncValues();
    renderVarList();
    refreshStat();
    scheduleSave();
    // 若删空了，重渲染以显示空态
    if ($blocks.querySelectorAll('.block').length === 0) renderBlocks();
  }

  function moveBlock(card, delta) {
    var cards = Array.prototype.slice.call($blocks.querySelectorAll('.block'));
    var i = cards.indexOf(card);
    var j = i + delta;
    if (j < 0 || j >= cards.length) return;
    var focused = document.activeElement === card.querySelector('.block-textarea');
    if (delta < 0) $blocks.insertBefore(card, cards[j]);
    else $blocks.insertBefore(cards[j], card);
    collectText();
    scheduleSave();
    if (focused) { var a = card.querySelector('.block-textarea'); if (a) a.focus(); }
  }

  /* ---------- 块拖拽（按手柄） ---------- */
  var dragBlock = null;

  function attachDrag(handle, card) {
    handle.addEventListener('pointerdown', function (e) {
      if (e.button !== 0) return;
      e.preventDefault();
      startBlockDrag(card, e);
    });
  }

  // 其它块的“让位”通过 FLIP 实现：记录旧位置 → 改变 DOM 顺序 →
  // 测新位置 → 反向 transform 归位 → 下一帧动画到 0，形成平滑滑动。
  function flipReorder(mutate) {
    var cards = Array.prototype.slice.call($blocks.querySelectorAll('.block'));
    var first = {};
    cards.forEach(function (c) { first[c.dataset.flipId] = c.getBoundingClientRect().top; });

    mutate(); // 改变 DOM 顺序

    cards.forEach(function (c) {
      if (c.classList.contains('dragging')) return; // 被拖块自行跟指针
      var oldTop = first[c.dataset.flipId];
      if (oldTop == null) return;
      var newTop = c.getBoundingClientRect().top;
      var dy = oldTop - newTop;
      if (!dy) return;
      c.classList.remove('flip');
      c.style.transform = 'translateY(' + dy + 'px)';
      // 强制回流后下一帧动画到 0
      requestAnimationFrame(function () {
        c.classList.add('flip');
        c.style.transform = '';
      });
    });
  }

  function startBlockDrag(card, ev) {
    dragBlock = card;
    document.body.style.userSelect = 'none';

    // 给每个块打一个稳定 id 供 FLIP 匹配
    Array.prototype.slice.call($blocks.querySelectorAll('.block')).forEach(function (c, i) {
      c.dataset.flipId = c.dataset.flipId || ('f' + i + '_' + Math.random().toString(36).slice(2, 6));
    });

    var rect = card.getBoundingClientRect();
    var startX = ev.clientX, startY = ev.clientY;
    var offsetY = ev.clientY - rect.top;

    // 占位块：等高，标记被拖块原位
    var placeholder = document.createElement('div');
    placeholder.className = 'block drag-placeholder';
    placeholder.dataset.flipId = 'placeholder';
    placeholder.style.height = rect.height + 'px';
    $blocks.insertBefore(placeholder, card.nextSibling);

    // 被拖块浮起：固定宽度，跟随指针
    var width = rect.width;
    card.classList.add('dragging');
    card.style.width = width + 'px';
    card.style.position = 'fixed';
    card.style.left = rect.left + 'px';
    card.style.top = rect.top + 'px';
    card.style.margin = '0';

    function moveFollow(e) {
      card.style.top = (e.clientY - offsetY) + 'px';
      card.style.left = rect.left + 'px';
    }
    moveFollow(ev);

    function onMove(e) {
      if (!dragBlock) return;
      moveFollow(e);

      // 静止块（排除被拖块与占位块本身），按 DOM 顺序
      var cards = Array.prototype.slice.call($blocks.querySelectorAll('.block'))
        .filter(function (c) { return c !== card && c !== placeholder; });

      // 指针 Y 与各静止块中点比较，决定占位块插到哪个块之前（null=末尾）
      var refNode = null;
      for (var i = 0; i < cards.length; i++) {
        var r = cards[i].getBoundingClientRect();
        if (e.clientY < r.top + r.height / 2) { refNode = cards[i]; break; }
      }

      // 占位块“在静止块序列中的当前落点”：它下一个静止兄弟（跳过 card）
      var curRef = placeholder.nextElementSibling;
      while (curRef && (curRef === card || !curRef.classList.contains('block'))) {
        curRef = curRef.nextElementSibling;
      }
      // 已在目标位置则不动，避免抖动；否则 FLIP 平滑让位
      if (refNode !== curRef) {
        flipReorder(function () {
          $blocks.insertBefore(placeholder, refNode);
        });
      }
    }

    function onUp() {
      if (!dragBlock) return cleanupListeners();
      // 松手瞬间被拖块的视觉位置（fixed 定位的 top）
      var fromTop = card.getBoundingClientRect().top;

      // 恢复流内定位，放回占位块处，测最终位置
      card.classList.remove('dragging', 'flip');
      card.style.position = '';
      card.style.top = card.style.left = card.style.width = card.style.margin = '';
      $blocks.insertBefore(card, placeholder);
      placeholder.remove();
      var toTop = card.getBoundingClientRect().top;

      // 一次 FLIP：从松手视觉位置平滑落到最终位置
      var dy = fromTop - toTop;
      if (dy) {
        card.style.transform = 'translateY(' + dy + 'px)';
        requestAnimationFrame(function () {
          card.classList.add('flip');
          card.style.transform = '';
        });
      }

      collectText();
      scheduleSave();
      cleanupListeners();
      dragBlock = null;
    }

    function cleanup() {
      if (placeholder && placeholder.parentNode) placeholder.remove();
      if (dragBlock) {
        dragBlock.classList.remove('dragging');
        dragBlock.style.position = '';
        dragBlock.style.top = dragBlock.style.left = dragBlock.style.width = dragBlock.style.margin = '';
      }
      cleanupListeners();
      dragBlock = null;
    }
    function cleanupListeners() {
      document.body.style.userSelect = '';
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    }

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  }

  function refreshStat() {
    var lang = state.lang;
    var compiled = compile(lang);
    var tokens = estimateTokens(compiled);
    var names = currentVarNames();
    var unfilled = names.filter(function (n) { var e = state.values[n]; return !e || !e[lang]; }).length;

    var parts = '<b>~' + tokens + '</b> tokens';
    if (names.length > 0) {
      if (unfilled > 0) parts += ' · <span class="et-bad">' + unfilled + ' 变量未填</span>';
      else parts += ' · 变量已填齐';
    }
    $editorStat.innerHTML = parts;
    $editorSub.textContent = state.lang === 'zh' ? '中文' : 'English';
  }

  function renderPreview() {
    var lang = state.lang;
    var raw = state.content[lang] || '';
    $preview.innerHTML = '';

    if (!raw.trim()) {
      var empty = document.createElement('div');
      empty.className = 'editor-preview-empty';
      empty.textContent = '正文为空，先在「编辑」里写点内容。';
      $preview.appendChild(empty);
      return;
    }

    // 按行渲染：## 开头的行做标题色；变量替换为值（未填高亮）
    var lines = raw.split('\n');
    lines.forEach(function (line, i) {
      if (/^##\s?/.test(line)) {
        var h = document.createElement('span');
        h.className = 'pv-h';
        h.textContent = line;
        $preview.appendChild(h);
      } else {
        appendLineWithVars($preview, line, lang);
      }
      if (i < lines.length - 1) $preview.appendChild(document.createTextNode('\n'));
    });
  }

  function appendLineWithVars(container, line, lang) {
    var lastIndex = 0, m;
    VAR_RE.lastIndex = 0;
    var found = false;
    while ((m = VAR_RE.exec(line)) !== null) {
      found = true;
      if (m.index > lastIndex) container.appendChild(document.createTextNode(line.slice(lastIndex, m.index)));
      var name = m[1];
      var entry = state.values[name] || { zh: '', en: '' };
      var val = entry[lang];
      var chip = document.createElement('span');
      chip.className = 'pv-var' + (val ? '' : ' unfilled');
      chip.textContent = val ? val : m[0];
      chip.title = val ? name : (name + '（未填）');
      chip.setAttribute('role', 'button');
      (function (nm) {
        chip.addEventListener('click', function () { focusVarInput(nm); });
      })(name);
      container.appendChild(chip);
      lastIndex = m.index + m[0].length;
    }
    if (!found) { container.appendChild(document.createTextNode(line)); return; }
    if (lastIndex < line.length) container.appendChild(document.createTextNode(line.slice(lastIndex)));
  }

  // 点预览里的变量 -> 聚焦左栏对应输入框
  function focusVarInput(name) {
    var rows = $varList.querySelectorAll('.var-row');
    for (var i = 0; i < rows.length; i++) {
      var chip = rows[i].querySelector('.var-name-chip');
      if (chip && chip.textContent === name) {
        var input = rows[i].querySelector('.var-value-input');
        if (input) { input.focus(); input.select(); }
        return;
      }
    }
  }

  /* ============================================================
   * 9. 语言 / 视图切换
   * ============================================================ */
  function setLang(lang) {
    if (state.lang === lang) return;
    // 切换前把当前编辑内容存回（仅编辑模式下 DOM 才是最新）
    if (view !== 'preview') collectText();
    state.lang = lang;
    renderAll();
    scheduleSave();
  }
  function toggleLang() { setLang(state.lang === 'zh' ? 'en' : 'zh'); }

  function renderLangSeg() {
    $langSegmented.querySelectorAll('button').forEach(function (b) {
      b.setAttribute('aria-pressed', b.dataset.lang === state.lang ? 'true' : 'false');
    });
  }
  $langSegmented.addEventListener('click', function (e) {
    var b = e.target.closest('button[data-lang]');
    if (b) setLang(b.dataset.lang);
  });

  function setView(v) {
    if (view === v) return;
    if (v === 'preview') collectText(); // 进预览前把块内容存回
    view = v;
    renderViewSeg();
    if (view === 'preview') {
      $blocks.hidden = true;
      $preview.hidden = false;
      renderPreview();
    } else {
      $preview.hidden = true;
      $blocks.hidden = false;
      renderBlocks();
    }
  }
  function toggleView() { setView(view === 'write' ? 'preview' : 'write'); }

  function renderViewSeg() {
    $viewSeg.querySelectorAll('button').forEach(function (b) {
      b.setAttribute('aria-pressed', b.dataset.view === view ? 'true' : 'false');
    });
  }
  $viewSeg.addEventListener('click', function (e) {
    var b = e.target.closest('button[data-view]');
    if (b) setView(b.dataset.view);
  });

  /* ============================================================
   * 10. 输出：复制 / 下载 / 示例 / 清空
   * ============================================================ */
  function doCopy() {
    if (view !== 'preview') collectText();
    var text = compile(state.lang);
    var langName = state.lang === 'zh' ? '中文' : 'English';
    if (clipboardApi && clipboardApi.writeText) {
      clipboardApi.writeText(text).then(function () { showToast('已复制' + langName + '提示词'); }).catch(function () { fallbackCopy(text, langName); });
    } else {
      fallbackCopy(text, langName);
    }
  }
  function fallbackCopy(text, langName) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { showToast('已复制' + langName + '提示词'); }).catch(function () { showToast('复制失败', true); });
    } else { showToast('复制失败：当前环境不支持', true); }
  }

  function doDownload() {
    if (view !== 'preview') collectText();
    var text = compile(state.lang);
    var defaultName = state.lang === 'zh' ? 'prompt-zh.md' : 'prompt-en.md';
    var langName = state.lang === 'zh' ? '中文' : 'English';
    if (dialogApi && dialogApi.save && fsApi && fsApi.writeTextFile) {
      dialogApi.save({ defaultPath: defaultName, filters: [{ name: 'Markdown', extensions: ['md'] }] })
        .then(function (filePath) {
          if (!filePath) return;
          return fsApi.writeTextFile(filePath, text).then(function () { showToast('已下载' + langName + '提示词'); });
        })
        .catch(function () { showToast('下载失败', true); });
    } else {
      var blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = defaultName;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showToast('已下载' + langName + '提示词');
    }
  }

  $btnCopy.addEventListener('click', doCopy);
  $btnDownload.addEventListener('click', doDownload);

  var $themeToggle = document.getElementById('themeToggle');
  $themeToggle.addEventListener('click', function () {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (dark) {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    try { localStorage.setItem('composer-theme', dark ? 'light' : 'dark'); } catch (e) {}
  });

  $btnLoadDemo.addEventListener('click', function () {
    state.content = demoContent();
    state.values = demoValues();
    if (view === 'preview') setView('write');
    renderAll();
    scheduleSave();
    showToast('已载入模板');
  });

  $btnClearAll.addEventListener('click', function () {
    if (!(state.content[state.lang] || '').trim()) { showToast('当前语言正文已经是空的'); return; }
    state.content[state.lang] = '';
    if (view === 'preview') setView('write');
    renderAll();
    scheduleSave();
    showToast('已清空' + (state.lang === 'zh' ? '中文' : 'English') + '正文');
  });

  /* ============================================================
   * 11. 快捷键
   * ============================================================ */
  document.addEventListener('keydown', function (e) {
    if (!(e.ctrlKey || e.metaKey)) return;
    var key = e.key.toLowerCase();
    if (key === 'l') { e.preventDefault(); toggleLang(); }
    else if (key === 's') { e.preventDefault(); doDownload(); }
    else if (key === 'p') { e.preventDefault(); toggleView(); }
    else if (key === 'c') {
      var sel = window.getSelection && window.getSelection().toString();
      var tag = document.activeElement && document.activeElement.tagName;
      var inField = tag === 'INPUT' || tag === 'TEXTAREA';
      if (!sel && !inField) { e.preventDefault(); doCopy(); }
    }
  });

  /* ============================================================
   * 12. 汇总渲染
