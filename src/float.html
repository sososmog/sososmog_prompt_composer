<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Composer 浮窗</title>
<style>
  /* ============================================================
   * 浮窗：无边框 + 透明窗口，根容器自己画圆角卡片背景。
   * 主题变量沿用主窗口深色配色的一个精简子集。
   * ============================================================ */
  :root {
    --bg-card:#202020;
    --surface:#2b2b2b;
    --surface-hi:#333333;
    --surface-inset:#262626;
    --line:#3c3c3c;
    --line-hi:#4a4a4a;
    --text:#e6e6e5;
    --text-soft:#b3b3b1;
    --muted:#8a8987;
    --faint:#6a6a68;
    --amber:#e08d70;
    --amber-hi:#eaa78e;
    --amber-deep:#c25f3f;
    --amber-soft:rgba(224,141,112,0.14);
    --radius:12px;
    --radius-sm:7px;
    --font-sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --font-mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  * { box-sizing:border-box; }
  html, body {
    margin:0; padding:0;
    width:100%; height:100%;
    background:transparent; /* 关键：保留窗口透明，圆角卡片由 .fw-card 自己画 */
    overflow:hidden;
  }
  body {
    font-family:var(--font-sans);
    font-size:13px;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  button, textarea { font-family:inherit; font-size:inherit; color:inherit; }
  :focus-visible { outline:2px solid var(--amber); outline-offset:1px; border-radius:5px; }

  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--line-hi); border-radius:5px; }

  .fw-card {
    width:100%; height:100%;
    display:flex; flex-direction:column;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:0 10px 34px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.3);
    overflow:hidden;
  }

  /* 顶部拖动条：data-tauri-drag-region 让无边框窗口可拖动 */
  .fw-drag {
    flex:none;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 8px 0 14px; height:34px;
    background:var(--surface);
    border-bottom:1px solid var(--line);
    -webkit-user-select:none; user-select:none;
  }
  .fw-title {
    font-size:11.5px; font-weight:600; letter-spacing:0.04em;
    color:var(--muted);
    pointer-events:none; /* 让标题不挡拖动 */
  }
  .fw-close {
    flex:none; width:24px; height:24px; border-radius:6px;
    border:none; background:transparent; color:var(--muted);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.14s ease, color 0.14s ease;
  }
  .fw-close:hover { background:rgba(224,62,62,0.16); color:#eb5757; }
  .fw-close svg { width:14px; height:14px; }

  .fw-body {
    flex:1; min-height:0; display:flex; flex-direction:column;
    padding:10px 10px 8px;
    gap:8px;
  }

  /* 编辑区 */
  .fw-editor-wrap {
    flex:1 1 auto; min-height:80px;
    display:flex; flex-direction:column;
    border:1px solid var(--line); border-radius:var(--radius-sm);
    background:var(--surface-inset);
    overflow:hidden;
  }
  .fw-editor-toolbar {
    flex:none; display:flex; align-items:center; justify-content:space-between;
    padding:5px 8px; border-bottom:1px solid var(--line);
    background:var(--surface);
  }
  .fw-editor-label {
    font-family:var(--font-mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--faint);
  }
  .fw-toolbar-left { display:flex; align-items:center; gap:10px; min-width:0; }

  /* 自动粘贴开关：小拨片 + 文字说明 */
  .fw-autopaste {
    display:inline-flex; align-items:center; gap:5px; cursor:pointer; user-select:none;
  }
  .fw-autopaste input { position:absolute; opacity:0; width:0; height:0; pointer-events:none; }
  .fw-autopaste-slider {
    position:relative; flex:none; width:24px; height:13px; border-radius:999px;
    background:var(--surface-hi); border:1px solid var(--line-hi);
    transition:background 0.16s ease, border-color 0.16s ease;
  }
  .fw-autopaste-slider::before {
    content:''; position:absolute; top:1px; left:1px; width:9px; height:9px; border-radius:50%;
    background:var(--muted); transition:transform 0.16s ease, background 0.16s ease;
  }
  .fw-autopaste input:checked + .fw-autopaste-slider { background:var(--amber-soft); border-color:var(--amber-deep); }
  .fw-autopaste input:checked + .fw-autopaste-slider::before { transform:translateX(11px); background:var(--amber); }
  .fw-autopaste-text { font-size:10px; color:var(--faint); letter-spacing:0.02em; white-space:nowrap; }
  .fw-autopaste input:checked ~ .fw-autopaste-text { color:var(--amber-hi); }
  .fw-autopaste input:disabled + .fw-autopaste-slider { opacity:0.5; }
  .fw-autopaste input:disabled ~ .fw-autopaste-text { opacity:0.5; }
  .fw-autopaste input:disabled { cursor:not-allowed; }
  .fw-autopaste:has(input:disabled) { cursor:not-allowed; }
  .fw-copy-btn {
    flex:none; display:inline-flex; align-items:center; gap:5px;
    border:1px solid var(--line-hi); background:var(--surface-hi); color:var(--text-soft);
    border-radius:6px; padding:3px 9px; font-size:11px; cursor:pointer;
    transition:border-color 0.14s ease, color 0.14s ease, background 0.14s ease;
  }
  .fw-copy-btn:hover { border-color:var(--amber-deep); color:var(--amber-hi); }
  .fw-copy-btn svg { width:12px; height:12px; }

  .fw-textarea {
    flex:1; width:100%; min-height:0; resize:none;
    border:none; outline:none; background:transparent; color:var(--text);
    padding:8px 10px;
    font-family:var(--font-sans); font-size:13px; line-height:1.6;
  }
  .fw-textarea::placeholder { color:var(--faint); }

  /* 下方：常用句 / 插入模块 列表 */
  .fw-lists { flex:none; display:flex; flex-direction:column; gap:6px; max-height:44%; overflow-y:auto; }
  .fw-section-title {
    font-size:10.5px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--muted); margin:2px 0 2px;
  }
  .fw-pill-wrap { display:flex; flex-wrap:wrap; gap:5px; }
  .fw-pill {
    display:inline-flex; align-items:center; gap:4px;
    background:var(--surface); border:1px solid var(--line);
    border-radius:999px; padding:4px 9px; font-size:11px; color:var(--text-soft);
    cursor:pointer; transition:background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    max-width:100%;
  }
  .fw-pill:hover { background:var(--amber-soft); border-color:var(--amber-deep); color:var(--amber-hi); }
  .fw-pill .fw-pill-plus { color:var(--amber); font-family:var(--font-mono); font-weight:600; }
  .fw-pill span.fw-pill-label {
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px;
  }
  .fw-empty-hint { color:var(--faint); font-size:11px; padding:2px 0; }

  /* 快速段落：可折叠分组 block（同时只展开一个） */
  .fw-quick-wrap { display:flex; flex-direction:column; gap:5px; }
  .fw-quick-block {
    border:1px solid var(--line); border-radius:var(--radius-sm);
    background:var(--surface); overflow:hidden;
  }
  .fw-qb-head {
    width:100%; display:flex; align-items:center; gap:6px;
    padding:5px 9px; border:none; background:transparent; color:var(--text-soft);
    cursor:pointer; text-align:left; font-size:11.5px;
    transition:background 0.12s ease, color 0.12s ease;
  }
  .fw-qb-head:hover { background:var(--amber-soft); color:var(--amber-hi); }
  .fw-qb-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fw-qb-count {
    flex:none; font-family:var(--font-mono); font-size:10px; color:var(--faint);
    background:var(--surface-inset); border-radius:999px; padding:1px 6px;
  }
  .fw-qb-caret { flex:none; display:flex; color:var(--faint); transition:transform 0.16s ease; }
  .fw-qb-caret svg { width:13px; height:13px; }
  .fw-quick-block.open .fw-qb-caret { transform:rotate(180deg); }
  .fw-qb-list {
    display:flex; flex-direction:column; gap:3px;
    padding:2px 6px 7px; border-top:1px solid var(--line);
  }
  .fw-qb-item {
    display:flex; flex-direction:column; gap:1px;
    border:1px solid var(--line); border-radius:6px; background:var(--surface-inset);
    padding:5px 8px; cursor:pointer; text-align:left; color:var(--text-soft);
    transition:border-color 0.12s ease, background 0.12s ease, color 0.12s ease;
  }
  .fw-qb-item:hover { border-color:var(--amber-deep); background:var(--amber-soft); color:var(--amber-hi); }
  .fw-qb-item-label { font-size:11px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fw-qb-item-preview {
    font-size:10px; color:var(--faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .fw-qb-item:hover .fw-qb-item-preview { color:var(--amber); }
  .fw-qb-empty { color:var(--faint); font-size:10.5px; padding:3px 2px; }

  /* 轻提示 toast */
  .fw-toast {
    position:absolute; left:50%; bottom:10px; transform:translateX(-50%) translateY(6px);
    background:var(--surface-hi); border:1px solid var(--line-hi); color:var(--text);
    padding:6px 14px; border-radius:999px; font-size:11.5px;
    display:flex; align-items:center; gap:6px;
    opacity:0; pointer-events:none; transition:opacity 0.18s ease, transform 0.18s ease;
    z-index:50; box-shadow:0 6px 18px rgba(0,0,0,0.35);
    white-space:nowrap;
  }
  .fw-toast::before { content:''; width:6px; height:6px; border-radius:50%; background:#4dab9a; flex:none; }
  .fw-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <div class="fw-card" id="fwCard" style="position:relative;">
    <div class="fw-drag" data-tauri-drag-region>
      <span class="fw-title" data-tauri-drag-region>COMPOSER</span>
      <button class="fw-close" id="fwCloseBtn" type="button" title="隐藏浮窗" aria-label="隐藏浮窗">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="fw-body">
      <div class="fw-editor-wrap">
        <div class="fw-editor-toolbar">
          <div class="fw-toolbar-left">
            <span class="fw-editor-label" id="fwEditorLabel">正文</span>
            <label class="fw-autopaste" id="fwAutoPasteLabel" title="开启后，点击下方“常用句/插入模块”会在复制后自动粘贴到刚才聚焦的外部窗口">
              <input type="checkbox" id="fwAutoPasteToggle" />
              <span class="fw-autopaste-slider"></span>
              <span class="fw-autopaste-text">点击即粘贴</span>
            </label>
          </div>
          <button class="fw-copy-btn" id="fwCopyBtn" type="button" title="复制编辑器内容">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
        </div>
        <textarea class="fw-textarea" id="fwTextarea" placeholder="正文内容…" spellcheck="false"></textarea>
      </div>

      <div class="fw-lists">
        <div>
          <div class="fw-section-title">插入模块</div>
          <div class="fw-pill-wrap" id="fwModuleWrap"></div>
        </div>
        <div>
          <div class="fw-section-title">常用句</div>
          <div class="fw-pill-wrap" id="fwSnippetWrap"></div>
        </div>
        <div>
          <div class="fw-section-title">快速段落</div>
          <div class="fw-quick-wrap" id="fwQuickWrap"></div>
        </div>
      </div>
    </div>

    <div class="fw-toast" id="fwToast" role="status" aria-live="polite"></div>
  </div>

<script type="module">
import {
  MODULE_BY_ID,
  BUILTIN_BY_ID,
  defaultState,
  normalizeState,
  escapeHtml,
} from './core.js';

(function () {
  'use strict';

  /* ============================================================
   * Tauri API 安全获取（浏览器预览时降级，不报错）
   * ============================================================ */
  var TAURI = window.__TAURI__ || null;
  var fsApi = TAURI && TAURI.fs;
  var clipboardApi = TAURI && TAURI.clipboardManager;
  var eventApi = TAURI && TAURI.event;
  var webviewWindowApi = TAURI && TAURI.webviewWindow;
  var coreApi = TAURI && TAURI.core;
  var BaseDirectory = fsApi && fsApi.BaseDirectory;
  var STATE_FILE = 'composer-state.json';
  function tauriAvailable() { return !!(TAURI && fsApi && BaseDirectory); }

  var currentWin = null;
  if (webviewWindowApi && webviewWindowApi.getCurrentWebviewWindow) {
    try { currentWin = webviewWindowApi.getCurrentWebviewWindow(); } catch (e) { currentWin = null; }
  }

  /* ============================================================
   * 状态：与主窗口共享同一份 composer-state.json，
   * 通过 'composer-state-changed' 事件广播实现实时双向同步。
   * ============================================================ */
  var state = defaultState();
  var suppressBroadcast = false; // 收到远端事件触发的本地更新，不再二次广播（防回声循环）
  var saveTimer = null;

  var $textarea = document.getElementById('fwTextarea');
  var $editorLabel = document.getElementById('fwEditorLabel');
  var $quickWrap = document.getElementById('fwQuickWrap');
  var $moduleWrap = document.getElementById('fwModuleWrap');
  var $snippetWrap = document.getElementById('fwSnippetWrap');
  var $copyBtn = document.getElementById('fwCopyBtn');
  var $closeBtn = document.getElementById('fwCloseBtn');
  var $toast = document.getElementById('fwToast');
  var $autoPasteToggle = document.getElementById('fwAutoPasteToggle');

  var toastTimer = null;
  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { $toast.classList.remove('show'); }, 1500);
  }

  function scheduleSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(persistAndBroadcast, 300);
  }

  var appDataEnsured = false;
  function ensureAppDataDir() {
    if (appDataEnsured || !fsApi.mkdir) return Promise.resolve();
    return fsApi.mkdir('.', { baseDir: BaseDirectory.AppData, recursive: true })
      .then(function () { appDataEnsured = true; })
      .catch(function () { appDataEnsured = true; });
  }

  function persistAndBroadcast() {
    if (!tauriAvailable()) return;
    var payload = JSON.stringify(state, null, 2);
    ensureAppDataDir().then(function () {
      return fsApi.writeTextFile(STATE_FILE, payload, { baseDir: BaseDirectory.AppData });
    }).then(function () {
      if (eventApi && eventApi.emit && !suppressBroadcast) {
        eventApi.emit('composer-state-changed', state).catch(function () {});
      }
    }).catch(function (err) { console.warn('浮窗持久化失败:', err); });
  }

  function restoreState() {
    if (!tauriAvailable()) { renderAll(); return; }
    fsApi.exists(STATE_FILE, { baseDir: BaseDirectory.AppData })
      .then(function (exists) {
        if (!exists) throw new Error('no-state-file');
        return fsApi.readTextFile(STATE_FILE, { baseDir: BaseDirectory.AppData });
      })
      .then(function (text) {
        var parsed = JSON.parse(text);
        if (parsed && typeof parsed === 'object') state = normalizeState(parsed);
      })
      .catch(function () { state = defaultState(); })
      .then(function () { renderAll(); });
  }

  /* ---------- 实时双向同步：监听主窗口（或另一端）广播的 state ----------
   * 与主窗口对称的保护：若浮窗此刻正在编辑（焦点在输入框/文本域），不立即
   * 整体替换 state（否则会冲掉浮窗尚未防抖保存的输入、并打断光标），而是把
   * 最新 payload 暂存，待失焦后再应用。只同步“没在编辑的那一端”。
   * ============================================================ */
  var pendingRemoteState = null;

  function isEditingLocally() {
    var el = document.activeElement;
    if (!el) return false;
    var tag = el.tagName;
    return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable === true;
  }

  function applyRemoteState(payload) {
    suppressBroadcast = true; // 远端来的更新，不要再广播回去，避免回声循环
    state = normalizeState(payload);
    renderAll();
    suppressBroadcast = false;
  }

  function flushPendingRemoteState() {
    if (pendingRemoteState && !isEditingLocally()) {
      var payload = pendingRemoteState;
      pendingRemoteState = null;
      applyRemoteState(payload);
    }
  }

  if (eventApi && eventApi.listen) {
    eventApi.listen('composer-state-changed', function (evt) {
      var payload = evt && evt.payload;
      if (!payload || typeof payload !== 'object') return;
      if (isEditingLocally()) { pendingRemoteState = payload; return; }
      applyRemoteState(payload);
    }).catch(function () {});
    document.addEventListener('focusout', function () {
      setTimeout(flushPendingRemoteState, 0);
    });
  }

  /* ============================================================
   * 渲染：编辑器
   * ============================================================ */
  function renderEditor() {
    $editorLabel.textContent = state.lang === 'zh' ? '中文正文' : 'English 正文';
    if (document.activeElement !== $textarea) {
      $textarea.value = state.content[state.lang] || '';
    }
  }

  $textarea.addEventListener('input', function () {
    state.content[state.lang] = $textarea.value;
    scheduleSave();
  });

  /* ============================================================
   * 渲染：插入模块 / 常用句 列表（只读展示 + 点击复制）
   * ============================================================ */
  function resolveModule(id) {
    var b = MODULE_BY_ID[id];
    if (b) {
      var p = state.modulePatches[id] || {};
      return {
        id: id,
        label: {
          zh: typeof p.labelZh === 'string' ? p.labelZh : b.label.zh,
          en: typeof p.labelEn === 'string' ? p.labelEn : b.label.en
        },
        text: {
          zh: typeof p.textZh === 'string' ? p.textZh : b.text.zh,
          en: typeof p.textEn === 'string' ? p.textEn : b.text.en
        },
        hidden: p.hidden === true
      };
    }
    var c = null;
    for (var i = 0; i < state.customModules.length; i++) {
      if (state.customModules[i].id === id) { c = state.customModules[i]; break; }
    }
    if (!c) return null;
    return { id: id, label: { zh: c.label.zh, en: c.label.en }, text: { zh: c.text.zh, en: c.text.en }, hidden: c.hidden === true };
  }

  function resolveSnippet(id) {
    var b = BUILTIN_BY_ID[id];
    if (b) {
      var p = state.builtinPatches[id] || {};
      return {
        id: id,
        tag: typeof p.tag === 'string' ? p.tag : b.tag,
        zh: typeof p.zh === 'string' ? p.zh : b.zh,
        en: typeof p.en === 'string' ? p.en : b.en,
        hidden: p.hidden === true
      };
    }
    var c = null;
    for (var i = 0; i < state.customSnippets.length; i++) {
      if (state.customSnippets[i].id === id) { c = state.customSnippets[i]; break; }
    }
    if (!c) return null;
    return { id: id, tag: c.tag, zh: c.zh, en: c.en, hidden: c.hidden === true };
  }

  /* ============================================================
   * 自动粘贴开关：仅浮窗本地生效，存 localStorage，不写入
   * composer-state.json（主窗口没这个功能，别污染同步）。
   * ============================================================ */
  var AUTOPASTE_STORAGE_KEY = 'composer-fw-autopaste';
  var canAutoPaste = !!(coreApi && coreApi.invoke);
  // 新用户（从未存过该 key）默认开启；存过则尊重用户上次的选择（含手动关掉的 '0'）。
  var autoPasteEnabled = true;
  try {
    var savedAutoPaste = window.localStorage.getItem(AUTOPASTE_STORAGE_KEY);
    autoPasteEnabled = savedAutoPaste === null ? true : savedAutoPaste === '1';
  } catch (e) { autoPasteEnabled = true; }

  if ($autoPasteToggle) {
    if (!canAutoPaste) {
      // 非 Tauri 环境（浏览器预览）没有粘贴命令可调，开关禁用并保持关闭
      autoPasteEnabled = false;
      $autoPasteToggle.disabled = true;
    }
    $autoPasteToggle.checked = autoPasteEnabled;
    $autoPasteToggle.addEventListener('change', function () {
      autoPasteEnabled = $autoPasteToggle.checked;
      try { window.localStorage.setItem(AUTOPASTE_STORAGE_KEY, autoPasteEnabled ? '1' : '0'); } catch (e) { /* 存不了就算了，不影响当次使用 */ }
      // 刷新 pill 的提示文案（复制 / 复制并粘贴）
      renderModuleGrid();
      renderQuickGroups();
    });
  }

  function isAutoPasteOn() { return canAutoPaste && autoPasteEnabled; }

  function formatPasteError(err) {
    if (!err) return '未知错误';
    if (typeof err === 'string') return err;
    if (err.message) return err.message;
    try { return String(err); } catch (e) { return '未知错误'; }
  }

  /* 复制成功后的收尾：若开关打开且提供了 pasteMsg，则再尝试自动粘贴到外部窗口；
   * 否则（或粘贴失败）就只提示复制结果。粘贴失败时降级提示，不让异常往上抛。 */
  function afterCopySucceeded(doneMsg, pasteMsg) {
    if (pasteMsg && isAutoPasteOn()) {
      var delayMs = (state.settings && typeof state.settings.pasteDelayMs === 'number') ? state.settings.pasteDelayMs : 60;
      coreApi.invoke('paste_to_active_window', { delayMs: delayMs }).then(function () {
        showToast(pasteMsg);
      }).catch(function (err) {
        showToast(doneMsg + '（粘贴失败：' + formatPasteError(err) + '）');
      });
    } else {
      showToast(doneMsg);
    }
  }

  /* pasteMsg 为可选参数：传了才会在自动粘贴开启时触发粘贴，
   * 编辑器工具栏的“复制”按钮不传，保持纯复制不变。 */
  function copyToClipboard(text, doneMsg, pasteMsg) {
    if (clipboardApi && clipboardApi.writeText) {
      clipboardApi.writeText(text).then(function () { afterCopySucceeded(doneMsg, pasteMsg); }).catch(function () { fallbackCopy(text, doneMsg, pasteMsg); });
    } else {
      fallbackCopy(text, doneMsg, pasteMsg);
    }
  }
  function fallbackCopy(text, doneMsg, pasteMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { afterCopySucceeded(doneMsg, pasteMsg); }).catch(function () { showToast('复制失败'); });
    } else { showToast('复制失败：当前环境不支持'); }
  }

  function renderModuleGrid() {
    var lang = state.lang;
    $moduleWrap.innerHTML = '';
    var mods = state.moduleOrder.map(resolveModule).filter(Boolean).filter(function (m) { return !m.hidden; });
    if (mods.length === 0) {
      $moduleWrap.innerHTML = '<span class="fw-empty-hint">暂无可用模块</span>';
      return;
    }
    mods.forEach(function (mod) {
      var pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'fw-pill';
      pill.title = isAutoPasteOn() ? '点击复制并粘贴到外部窗口' : '点击复制到剪贴板';
      var label = mod.label[lang] || mod.label.zh || mod.label.en || '';
      pill.innerHTML = '<span class="fw-pill-plus">+</span><span class="fw-pill-label">' + escapeHtml(label) + '</span>';
      pill.addEventListener('click', function () {
        var text = mod.text[lang] || mod.text.zh || mod.text.en || '';
        copyToClipboard(text, '已复制「' + label + '」', '已粘贴「' + label + '」');
      });
      $moduleWrap.appendChild(pill);
    });
  }

  function renderSnippetGrid() {
    var lang = state.lang;
    $snippetWrap.innerHTML = '';
    var snips = state.snippetOrder.map(resolveSnippet).filter(Boolean).filter(function (s) { return !s.hidden; });
    if (snips.length === 0) {
      $snippetWrap.innerHTML = '<span class="fw-empty-hint">暂无可用常用句</span>';
      return;
    }
    snips.forEach(function (snip) {
      var pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'fw-pill';
      pill.title = snip[lang] || snip.zh || snip.en || '';
      pill.innerHTML = '<span class="fw-pill-label">' + escapeHtml(snip.tag) + '</span>';
      pill.addEventListener('click', function () {
        var text = snip[lang] || snip.zh || snip.en || '';
        copyToClipboard(text, '已复制「' + snip.tag + '」', '已粘贴「' + snip.tag + '」');
      });
      $snippetWrap.appendChild(pill);
    });
  }

  /* ============================================================
   * 渲染：快速段落（可折叠分组，同时只展开一个）
   * 点击段落沿用 pill 的复制/自动粘贴范式，与插入模块/常用句一致。
   * ============================================================ */
  var CHEVRON_SVG =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
    'stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  var openQuickGroupId = null; // 当前展开的分组 id

  function renderQuickGroups() {
    if (!$quickWrap) return;
    var lang = state.lang;
    $quickWrap.innerHTML = '';

    var visible = state.quickGroups.filter(function (g) { return !g.hidden; });
    if (visible.length === 0) {
      $quickWrap.innerHTML = '<span class="fw-empty-hint">暂无快速段落</span>';
      return;
    }
    // 展开的分组若已不可见/被删，收起
    if (openQuickGroupId && !visible.some(function (g) { return g.id === openQuickGroupId; })) {
      openQuickGroupId = null;
    }

    visible.forEach(function (group) {
      var isOpen = group.id === openQuickGroupId;
      var block = document.createElement('div');
      block.className = 'fw-quick-block' + (isOpen ? ' open' : '');

      var head = document.createElement('button');
      head.type = 'button';
      head.className = 'fw-qb-head';
      head.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      var name = group.label[lang] || group.label.zh || group.label.en || '未命名分组';
      head.innerHTML =
        '<span class="fw-qb-name"></span>' +
        '<span class="fw-qb-count">' + group.items.length + '</span>' +
        '<span class="fw-qb-caret">' + CHEVRON_SVG + '</span>';
      head.querySelector('.fw-qb-name').textContent = name;
      head.title = name;
      head.addEventListener('click', function () {
        openQuickGroupId = isOpen ? null : group.id;
        renderQuickGroups();
      });
      block.appendChild(head);

      if (isOpen) {
        var list = document.createElement('div');
        list.className = 'fw-qb-list';
        if (group.items.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'fw-qb-empty';
          empty.textContent = '该分组还没有段落。';
          list.appendChild(empty);
        } else {
          group.items.forEach(function (item) {
            var text = item.text[lang] || item.text.zh || item.text.en || '';
            var itemLabel = item.label[lang] || item.label.zh || item.label.en || '（未命名段落）';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'fw-qb-item';
            btn.title = isAutoPasteOn() ? '点击复制并粘贴到外部窗口' : '点击复制到剪贴板';
            var lb = document.createElement('span');
            lb.className = 'fw-qb-item-label';
            lb.textContent = itemLabel;
            var pv = document.createElement('span');
            pv.className = 'fw-qb-item-preview';
            pv.textContent = text.replace(/\s+/g, ' ').trim();
            btn.appendChild(lb);
            btn.appendChild(pv);
            btn.addEventListener('click', function () {
              if (!text) { showToast('该段落还没有内容'); return; }
              copyToClipboard(text, '已复制「' + itemLabel + '」', '已粘贴「' + itemLabel + '」');
            });
            list.appendChild(btn);
          });
        }
        block.appendChild(list);
      }
      $quickWrap.appendChild(block);
    });
  }

  function renderAll() {
    renderEditor();
    renderQuickGroups();
    renderModuleGrid();
    renderSnippetGrid();
  }

  /* ============================================================
   * 顶部操作
   * ============================================================ */
  $copyBtn.addEventListener('click', function () {
    var text = $textarea.value || '';
    copyToClipboard(text, '已复制编辑器内容');
  });

  $closeBtn.addEventListener('click', function () {
    if (currentWin && currentWin.hide) {
      currentWin.hide().then(function () {
        // 通知主窗口 toggle 按钮即时收起激活态，无需等到主窗口重新获得焦点
        if (eventApi && eventApi.emit) {
          eventApi.emit('composer-float-visibility', { visible: false }).catch(function () {});
        }
      }).catch(function () {});
    }
  });

  restoreState();
})();
</script>
</body>
</html>
